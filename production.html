<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тигервуд — производство</title>
<style>
  :root{ --bg:#f4f6fb; --card:#fff; --fg:#1b2333; --muted:#8a93a6; --line:#e6e9f2; --accent:#2b7de9; --green:#137333; --amber:#b7791f; --red:#c0392b; }
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);}
  body{ font-family:-apple-system,Roboto,Segoe UI,Arial,sans-serif; color:var(--fg); padding:14px; max-width:900px; margin:0 auto; font-size:14px; }
  .hi{ font-size:19px; font-weight:800; }
  .muted{ color:var(--muted); font-size:13px; }
  .sect{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:20px 4px 8px; display:flex; justify-content:space-between; align-items:center; }
  .box{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td{ text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap; }
  th{ color:var(--muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; }
  button{ padding:8px 13px; border:0; border-radius:9px; font-size:13px; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
  button.gray{ background:#eef1f8; color:#334; } button.green{ background:var(--green); } button.sm{ padding:5px 9px; font-size:12px; }
  button:disabled{ opacity:.5; cursor:default; }
  input,select{ padding:6px 8px; border:1px solid var(--line); border-radius:8px; font-size:13px; }
  input.q{ width:64px; text-align:right; font-variant-numeric:tabular-nums; }
  .pill{ font-size:11px; padding:2px 9px; border-radius:20px; font-weight:700; }
  .p-need{ background:#fdeee7; color:var(--amber); } .p-ok{ background:#e7f5ea; color:var(--green); }
  .prio{ cursor:pointer; }
  .prio.on{ background:#fdecea; color:var(--red); } .prio.off{ background:#eef1f8; color:#556; }
  .bcard{ border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; }
  .bhead{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .bnum{ font-weight:800; font-size:15px; } .bpct{ font-variant-numeric:tabular-nums; }
  .bar{ height:6px; background:#eef1f8; border-radius:6px; overflow:hidden; flex:1; min-width:80px; }
  .bar>i{ display:block; height:100%; background:var(--green); }
  .msg{ font-size:13px; margin-left:8px; } .err{ color:var(--red); } .ok{ color:var(--green); }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .center{ text-align:center; padding:36px 16px; }
</style>
</head>
<body>
<div class="hi">🏭 Производство · план и наличие</div>
<div id="app"><div class="center muted">Загрузка…</div></div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbxbCSBcKbG-az-3-_JPJpMLtlQHenJJftHwXM_N-7PvBMfHWVD6xqxDD36nrmtBIz8W/exec';
var APP='tw7prod';
function api(p){ p.app=APP; var q=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]==null?'':p[k]);}).join('&'); return fetch(BASE+'?'+q).then(function(r){return r.json();}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function $(id){ return document.getElementById(id); }
function money(n){ n=Number(n)||0; return n.toFixed(2).replace('.',','); }
var app=$('app'), NEEDS=[], BATCHES=[], MODELS=[], MODMAP={};

function load(){
  app.innerHTML='<div class="center muted">Загрузка…</div>';
  Promise.all([api({vapi:'prodneeds'}), api({vapi:'batches'})]).then(function(res){
    NEEDS=(res[0]&&res[0].rows)||[]; BATCHES=(res[1]&&res[1].batches)||[];
    render();
    if(!MODELS.length) loadModels();
  }).catch(function(e){ app.innerHTML='<div class="center err">Ошибка загрузки: '+esc(e.message||e)+'</div>'; });
}
function loadModels(){
  api({vapi:'catmodels'}).then(function(r){
    MODELS=(r&&r.rows)||[]; MODMAP={}; MODELS.forEach(function(m){ MODMAP[modLabel(m)]=m; });
    var dl=$('modlist'); if(dl) dl.innerHTML=MODELS.map(function(m){ return '<option value="'+esc(modLabel(m))+'">'; }).join('');
  }).catch(function(){});
}
function modLabel(m){ var v=[m.size,m.color,m.kit].filter(Boolean).join(' '); return [m.equip,m.model].filter(Boolean).join(' · ')+(v?(' ('+v+')'):'')+(m.sku?(' — '+m.sku):''); }
function costBadge(s){ if(s==='полностью') return '<span class="pill" style="background:#e7f5ea;color:#137333">✓ посчитано</span>'; if(s==='частично') return '<span class="pill" style="background:#fbf1de;color:#b7791f">~ частично</span>'; return '<span class="pill" style="background:#fdeee7;color:#c0392b">✗ не посчитано</span>'; }

function nm(x){ return [x.equip,x.model].filter(Boolean).join(' · ')||x.sku||'—'; }

function render(){
  var needRows=NEEDS.map(function(n,i){
    var badge=n.toProduce>0?'<span class="pill p-need">'+n.toProduce+'</span>':'<span class="pill p-ok">0</span>';
    return '<tr><td>'+esc(nm(n))+(n.sku?' <span class="muted">'+esc(n.sku)+'</span>':'')+'</td>'
      +'<td class="num">'+n.sold+'</td><td class="num">'+n.available+'</td><td class="num">'+n.inProduction+'</td>'
      +'<td class="num"><input class="q" id="tg'+i+'" value="'+(n.target||0)+'"> <button class="gray sm" onclick="saveTarget('+i+')">✓</button></td>'
      +'<td class="num">'+badge+'</td></tr>';
  }).join('');
  var needTotal=NEEDS.reduce(function(s,n){return s+(n.toProduce||0);},0);

  var opts0=['новая','в работе','готово','отгружено'];
  var batchCards=BATCHES.map(function(b){
    var opts=opts0.map(function(s){return '<option'+(s===b.status?' selected':'')+'>'+s+'</option>';}).join('');
    var items=(b.items||[]).map(function(it){
      return '<tr><td>'+esc([it.equip,it.model].filter(Boolean).join(' · ')||it.sku||'—')+(it.sku?' <span class="muted">'+esc(it.sku)+'</span>':'')+'</td>'
        +'<td>'+costBadge(it.costing)+(it.unitCost?' <span class="muted">'+it.unitCost.toFixed(2).replace('.',',')+' р/шт</span>':'')+'</td>'
        +'<td class="num"><input class="q" value="'+it.qty+'" onchange="updItem(\''+it.id+'\',this.value)"></td>'
        +'<td class="num"><input class="q" value="'+(it.done||0)+'" onchange="saveDone(\''+b.id+'\',\''+esc(it.sku)+'\',\''+esc(it.model)+'\',this.value)"></td>'
        +'<td><button class="gray sm" title="убрать" onclick="rmItem(\''+it.id+'\')">🗑</button></td></tr>';
    }).join('');
    var prio=b.prio==='срочно';
    var costSum=(b.modelsCosted||0)+'/'+(b.modelsTotal||0);
    var costCol=(b.modelsTotal&&b.modelsCosted===b.modelsTotal)?'#137333':(b.modelsCosted?'#b7791f':'#c0392b');
    return '<div class="bcard"><div class="bhead">'
      +'<span class="bnum">'+esc(b.num)+'</span>'
      +'<span class="muted" style="cursor:pointer" onclick="renameBatch(\''+b.id+'\',\''+esc(b.name).replace(/\x27/g,"")+'\')">'+esc(b.name)+' ✎</span>'
      +'<select onchange="setStatus(\''+b.id+'\',this.value)">'+opts+'</select>'
      +'<span class="pill prio '+(prio?'on':'off')+'" onclick="togglePrio(\''+b.id+'\','+(prio?0:1)+')">'+(prio?'🔥 срочно':'обычный')+'</span>'
      +'<span class="pill" style="background:#f0edfb;color:'+costCol+'">посчитано '+costSum+' · труд '+money(b.labor||0)+' р</span>'
      +(b.opsCount?'<span class="pill" style="background:#eaf1fd;color:#2b7de9">по труду '+(b.pctLabor||0)+'%</span>':'')
      +(b.overflow?'<span class="pill" style="background:#fdecea;color:#c0392b" title="есть перевыполненные операции">⚠ перевыполнено</span>':'')
      +(b.plan?'<span class="muted">план '+esc(b.plan)+'</span>':'')
      +'<button class="gray sm" onclick="ship(\''+b.id+'\')">📦 Отгрузить</button>'
      +'<button class="gray sm" title="удалить партию" onclick="delBatch(\''+b.id+'\')">🗑</button>'
      +'<span class="msg" id="bm_'+b.id+'"></span>'
      +'</div>'
      +(items?'<table style="margin-top:8px"><thead><tr><th>Модель</th><th>Труд</th><th class="num">Кол-во</th><th class="num">Готово→склад</th><th></th></tr></thead><tbody>'+items+'</tbody></table>':'<div class="muted" style="margin-top:6px">позиций нет — добавьте модель ниже</div>')
      +'<div class="row" style="margin-top:8px"><input list="modlist" id="am_'+b.id+'" placeholder="модель из каталога…" style="min-width:240px"><input class="q" id="aq_'+b.id+'" placeholder="кол-во"><button class="green sm" onclick="addItem(\''+b.id+'\')">＋ добавить модель</button>'
      +'<button class="gray sm" onclick="toggleOps(\''+b.id+'\')" id="opsbtn_'+b.id+'">▸ по операциям</button></div>'
      +'<div id="ops_'+b.id+'" style="display:none;margin-top:10px"></div>'
      +'</div>';
  }).join('');
  var datalist='<datalist id="modlist">'+MODELS.map(function(m){ return '<option value="'+esc(modLabel(m))+'">'; }).join('')+'</datalist>';   // наполняется loadModels()

  app.innerHTML=datalist
    +'<div class="sect">Потребность к производству <button class="sm" onclick="planNow()">⚙️ Собрать из продаж</button></div>'
    +'<div class="box"><table><thead><tr><th>Товар</th><th class="num">Продано-ждёт</th><th class="num">Доступно</th><th class="num">В произв.</th><th class="num">Целевой запас</th><th class="num">К произв.</th></tr></thead><tbody>'
    +(needRows||'<tr><td colspan=6 class="muted">потребности нет</td></tr>')+'</tbody></table>'
    +'<div class="muted" style="margin-top:8px">«Собрать из продаж» соберёт партию по непроведённым продажам (наличие в резерв, нехватку — в производство).</div></div>'
    +'<div class="sect">Партии на производство <button class="sm" onclick="newBatch()">＋ Новая партия</button></div>'
    +'<div class="muted" style="margin:-4px 4px 8px">Заказ на производство ≠ отгрузка клиенту — готовое ложится на склад. «Труд» и «посчитано» считаются вживую из состава каталога.</div>'
    +(batchCards||'<div class="box muted">партий нет — создайте новую</div>');
}

function toggleOps(id){
  var box=$('ops_'+id), btn=$('opsbtn_'+id);
  if(box.style.display!=='none'){ box.style.display='none'; btn.textContent='▸ по операциям'; return; }
  box.style.display=''; btn.textContent='▾ по операциям'; box.innerHTML='<div class="muted">Загрузка операций…</div>';
  api({vapi:'orderops',batch:id}).then(function(r){ if(!r||!r.ok){ box.innerHTML='<div class="err">'+esc((r&&r.error)||'ошибка')+'</div>'; return; } renderOps(id,r); });
}
function renderOps(id,r){
  var box=$('ops_'+id), k=r.kpi||{};
  var warn = (r.notAssembled&&r.notAssembled.length) ? '<div class="pill" style="background:#fbf1de;color:#b7791f;display:inline-block;margin-bottom:8px">⚠ не подтверждены директором как «собрано»: '+r.notAssembled.map(esc).join(', ')+'</div>' : '';
  var kpi='<div class="row" style="gap:14px;margin-bottom:8px;font-weight:700">'
    +'<span>Готовность по труду: <span style="color:#2b7de9">'+(k.pct||0)+'%</span></span>'
    +'<span class="muted" style="font-weight:400">нужно '+money(k.needRub)+' р · сделано '+money(k.doneRub)+' р · осталось '+money(k.leftRub)+' р</span>'
    +(k.overflow?'<span class="pill" style="background:#fdecea;color:#c0392b">⚠ перевыполнение +'+Math.round(k.over)+'</span>':'')+'</div>';
  var prods=(r.products||[]).map(function(p){
    var rows=p.ops.map(function(o){
      var over=o.over>0?' <span class="pill" style="background:#fdecea;color:#c0392b">+'+o.over+'</span>':'';
      var leftCol=o.left>0?'color:#c0392b':'color:#137333';
      return '<tr><td>'+esc(o.detail)+'</td><td>'+esc(o.op)+'</td>'
        +'<td class="num">'+o.need+'</td>'
        +'<td class="num"><input class="q" value="'+(o.stock||0)+'" title="начальные остатки — работа уже выполнена (не важно кем)" onchange="setStock(\''+id+'\',\''+o.id+'\',this.value)"></td>'
        +'<td class="num">'+o.done+'</td>'
        +'<td class="num" style="'+leftCol+'">'+o.left+over+'</td></tr>';
    }).join('');
    return '<div style="margin-top:8px"><div style="font-weight:700">'+esc(p.eq)+' · '+esc(p.model)+' ×'+p.ordered
      +(p.assembled?' <span class="pill p-ok">✔ собрано</span>':' <span class="pill" style="background:#fbf1de;color:#b7791f">⚠ не подтверждено</span>')
      +' <span class="muted" style="font-weight:400">'+(p.pct||0)+'% · осталось '+money(p.leftRub)+' р</span></div>'
      +'<table style="margin-top:4px"><thead><tr><th>Деталь</th><th>Операция</th><th class="num">Нужно</th><th class="num">Нач. остатки</th><th class="num">Сделано</th><th class="num">Осталось</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }).join('');
  box.innerHTML=warn+kpi+(prods||'<div class="muted">нет операций — у изделий заказа не задан состав в каталоге</div>');
}
function setStock(batchId,opId,val){
  api({vapi:'setopstock',op:opId,stock:val}).then(function(r){ if(r&&r.ok){ renderOps(batchId,r); } else alert((r&&r.error)||'не сохранилось'); });
}
function planNow(){
  api({vapi:'planprod'}).then(function(r){
    if(!r||!r.ok){ alert((r&&r.error)||'не удалось спланировать'); return; }
    load();
  }).catch(function(e){ alert('Ошибка: '+(e.message||e)); });
}
function saveTarget(i){
  var n=NEEDS[i], v=$('tg'+i).value;
  api({vapi:'settarget', sku:n.sku||'', target:v, min:'', eq:n.equip||'', mod:n.model||''}).then(function(){ load(); });
}
function setStatus(id,st){ api({vapi:'setbstatus', batch:id, status:st}).then(function(){ load(); }); }
function togglePrio(id,on){ api({vapi:'setprio', batch:id, prio:on?'срочно':'обычный'}).then(function(){ load(); }); }
function saveDone(id,sku,mod,v){
  var m=$('bm_'+id); if(m) m.textContent='…';
  api({vapi:'batchdone', batch:id, sku:sku, mod:mod, done:v}).then(function(r){
    if(m) m.innerHTML=(r&&r.ok)?'<span class="ok">✓ на склад</span>':'<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; setTimeout(load,700);
  });
}
function newBatch(){ var nm=prompt('Название партии (или пусто — авто):',''); if(nm===null) return; api({vapi:'createbatch', name:nm}).then(function(r){ if(r&&r.ok) load(); else alert('Ошибка'); }); }
function renameBatch(id,cur){ var nm=prompt('Название партии:',cur||''); if(nm===null||!nm.trim()) return; api({vapi:'renamebatch', batch:id, name:nm.trim()}).then(function(){ load(); }); }
function delBatch(id){ if(!confirm('Удалить партию со всеми позициями?')) return; api({vapi:'delbatch', batch:id}).then(function(){ load(); }); }
function addItem(id){
  var lbl=$('am_'+id).value.trim(), qty=$('aq_'+id).value, m=$('bm_'+id);
  var mod=MODMAP[lbl];
  if(!mod){ if(m) m.innerHTML='<span class="err">выберите модель из списка</span>'; return; }
  if(!(Number(qty)>0)){ if(m) m.innerHTML='<span class="err">укажите количество</span>'; return; }
  api({vapi:'additem', batch:id, sku:mod.sku, eq:mod.equip, mod:mod.model, qty:qty}).then(function(r){ if(r&&r.ok) load(); else if(m) m.innerHTML='<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; });
}
function updItem(itemId,v){ api({vapi:'upditem', item:itemId, qty:v}).then(function(){ load(); }); }
function rmItem(itemId){ api({vapi:'rmitem', item:itemId}).then(function(){ load(); }); }
function ship(id){ var m=$('bm_'+id); m.textContent='…'; api({vapi:'shipbatch', batch:id}).then(function(r){ m.innerHTML=(r&&r.ok)?'<span class="ok">отгружено '+(r.shipped||0)+'</span>':'<span class="err">ошибка</span>'; setTimeout(load,700); }); }

load();
</script>
</body>
</html>
