<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тигервуд — производство</title>
<style>
  :root{ --bg:#f4f6fb; --card:#fff; --fg:#1b2333; --muted:#8a93a6; --line:#e6e9f2; --accent:#2b7de9; --green:#137333; --amber:#b7791f; --red:#c0392b; }
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);}
  body{ font-family:-apple-system,Roboto,Segoe UI,Arial,sans-serif; color:var(--fg); padding:14px; max-width:900px; margin:0 auto; font-size:14px; }
  .hi{ font-size:19px; font-weight:800; }
  .muted{ color:var(--muted); font-size:13px; }
  .sect{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:20px 4px 8px; display:flex; justify-content:space-between; align-items:center; }
  .box{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td{ text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap; }
  th{ color:var(--muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; }
  button{ padding:8px 13px; border:0; border-radius:9px; font-size:13px; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
  button.gray{ background:#eef1f8; color:#334; } button.green{ background:var(--green); } button.sm{ padding:5px 9px; font-size:12px; }
  button:disabled{ opacity:.5; cursor:default; }
  input,select{ padding:6px 8px; border:1px solid var(--line); border-radius:8px; font-size:13px; }
  input.q{ width:64px; text-align:right; font-variant-numeric:tabular-nums; }
  .pill{ font-size:11px; padding:2px 9px; border-radius:20px; font-weight:700; }
  /* компактная отметка «собрано»: иконка, надпись выезжает по наведению (не двигает соседние колонки) */
  .asm{ position:relative; display:inline-flex; align-items:center; justify-content:center; width:22px; height:20px; border-radius:20px; font-size:12px; font-weight:700; text-decoration:none; vertical-align:middle; }
  .asm.ok{ background:#e7f5ea; color:#137333; }
  .asm.no{ background:#fbf1de; color:#b7791f; cursor:pointer; }
  .asm .t{ position:absolute; left:100%; top:0; margin-left:4px; height:20px; line-height:20px; padding:0 9px; white-space:nowrap; border-radius:20px; max-width:0; overflow:hidden; opacity:0; transition:max-width .18s ease, opacity .18s ease; pointer-events:none; box-shadow:0 1px 6px rgba(20,30,60,.14); z-index:5; }
  .asm.ok .t{ background:#e7f5ea; color:#137333; } .asm.no .t{ background:#fbf1de; color:#b7791f; }
  .asm:hover .t{ max-width:150px; opacity:1; }
  .p-need{ background:#fdeee7; color:var(--amber); } .p-ok{ background:#e7f5ea; color:var(--green); }
  .prio{ cursor:pointer; }
  .prio.on{ background:#fdecea; color:var(--red); } .prio.off{ background:#eef1f8; color:#556; }
  .bcard{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:16px; box-shadow:0 1px 3px rgba(20,30,60,.06); }
  .bcard.click{ cursor:pointer; transition:box-shadow .15s ease, transform .05s ease; }
  .bcard.click:hover{ box-shadow:0 4px 16px rgba(20,30,60,.14); border-color:#d3d9ea; }
  .bcard.click:active{ transform:translateY(1px); }
  .bcard .mrow{ display:flex; justify-content:space-between; gap:6px; align-items:baseline; padding:6px 0; border-top:1px solid #f0f2f8; }
  .bcard .mrow:first-of-type{ border-top:0; }
  .bhead{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .bnum{ font-weight:800; font-size:15px; } .bpct{ font-variant-numeric:tabular-nums; }
  .bar{ height:6px; background:#eef1f8; border-radius:6px; overflow:hidden; flex:1; min-width:80px; }
  .bar>i{ display:block; height:100%; background:var(--green); }
  .msg{ font-size:13px; margin-left:8px; } .err{ color:var(--red); } .ok{ color:var(--green); }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .center{ text-align:center; padding:36px 16px; }
  /* ── лоток блока: утопленный фон отделяет группы друг от друга ── */
  .tray{ background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:18px; }
  .trayhd{ display:flex; align-items:baseline; gap:9px; margin-bottom:10px; flex-wrap:wrap; }
  .trayhd .tt{ font-size:12.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--fg); }
  .trayhd .cnt{ font-size:11px; font-weight:700; background:#fff; border:1px solid var(--line); border-radius:20px;
    padding:1px 8px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .trayhd .th{ font-size:12px; color:var(--muted); margin-left:auto; }
  @media(max-width:640px){ .trayhd .th{ margin-left:0; flex-basis:100%; } }
  .tray .gcard:last-child, .tray .pcard:last-child{ margin-bottom:0; }
  /* ── участки работ ── */
  .gcard{ border:1px solid var(--line); border-left-width:4px; border-radius:10px; margin-bottom:8px; background:#fff; }
  .grow{ display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer; user-select:none; }
  .grow:hover{ background:#fafbfe; }
  .gname{ font-weight:700; min-width:96px; }
  .gpct{ font-variant-numeric:tabular-nums; font-weight:700; min-width:48px; text-align:right; }
  .gsum{ color:var(--muted); font-size:12px; min-width:160px; text-align:right; font-variant-numeric:tabular-nums; }
  /* узкий экран: строка переносится, итог уходит на свою строку — иначе цифры обрезаются */
  @media(max-width:700px){
    .grow{ flex-wrap:wrap; row-gap:6px; }
    .gname{ min-width:0; flex:1 1 auto; }
    .bar{ min-width:56px; } .gpct{ min-width:40px; }
    /* строка 1: название + шкала + %, строка 2: участок + итог — иначе % отрывается посреди */
    .gcar{ order:0; } .gname{ order:1; } .bar{ order:2; } .gpct{ order:3; }
    .grow .pill.zn{ order:4; }
    .gsum{ min-width:0; flex:1 1 auto; text-align:right; order:5; }
  }
  .gcar{ color:var(--muted); font-size:12px; width:12px; transition:transform .15s ease; }
  .gcard.open .gcar{ transform:rotate(90deg); }
  .gbody{ display:none; padding:0 12px 10px; overflow-x:auto; } .gcard.open .gbody{ display:block; }
  .pill.zn{ background:#eef1f8; color:#556; font-weight:600; }
  .pill.sh{ background:#e8eefc; color:#2b5fd9; cursor:help; }   /* деталь идёт в нескольких изделиях */
  /* ── проверки логики ── */
  .chkok{ margin-top:18px; font-size:13px; color:var(--green); background:#e7f5ea; border:1px solid #cfe9d7; border-radius:10px; padding:9px 12px; }
  .chktray{ border-color:#f0d9b5; background:#fdf7ec; }
  .cbadge{ font-size:12px; font-weight:700; border-radius:20px; padding:1px 9px; font-variant-numeric:tabular-nums; }
  .cbadge.red{ background:#fdecea; color:#c0392b; } .cbadge.amber{ background:#f7efdb; color:#b7791f; } .cbadge.info{ background:#e8eefc; color:#2b5fd9; }
  .chklist{ max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
  .cissue{ display:flex; gap:9px; align-items:flex-start; font-size:12.5px; background:#fff; border:1px solid var(--line); border-left-width:3px; border-radius:9px; padding:8px 10px; }
  .cissue .cdot{ width:8px; height:8px; border-radius:50%; margin-top:5px; flex:none; }
  .cissue.red{ border-left-color:#c0392b; } .cissue.red .cdot{ background:#c0392b; }
  .cissue.amber{ border-left-color:#b7791f; } .cissue.amber .cdot{ background:#b7791f; }
  .cissue.info{ border-left-color:#2b5fd9; } .cissue.info .cdot{ background:#2b5fd9; }
  .cissue[data-jump]:hover{ background:#fafbfe; }
  .cgo{ color:var(--accent); font-weight:600; white-space:nowrap; cursor:pointer; }
  .cx{ color:var(--muted); font-weight:600; white-space:nowrap; cursor:pointer; margin-left:6px; }
  .cx:hover{ color:var(--red); }
  .chk{ font-size:11px; cursor:pointer; } .chk.red{ color:#c0392b; } .chk.amber{ color:#b7791f; } .chk.info{ color:#2b5fd9; }
  tr.hl{ background:#fff6d8; transition:background .3s ease; }
  /* значок «⚠ N» в списке заказов */
  .abadge{ font-size:11px; font-weight:700; border-radius:20px; padding:1px 8px; background:#fdecea; color:#c0392b; }
  .abadge.amberonly{ background:#f7efdb; color:#b7791f; }
  /* ── изделие: сворачиваемая карточка ── */
  .pcard{ border:1px solid var(--line); border-radius:12px; margin-bottom:8px; background:#fff; }
  .phead{ display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; user-select:none; flex-wrap:wrap; }
  .phead:hover{ background:#fafbfe; }
  .pname{ font-weight:700; flex:1; min-width:160px; }
  .ppct{ font-variant-numeric:tabular-nums; font-weight:700; min-width:44px; text-align:right; }
  .pcar{ color:var(--muted); font-size:12px; width:12px; transition:transform .15s ease; }
  .pcard.open .pcar{ transform:rotate(90deg); }
  .pbody{ display:none; padding:0 12px 12px; overflow-x:auto; } .pcard.open .pbody{ display:block; }
</style>
</head>
<body>
<div class="hi">🏭 Производство · план и наличие</div>
<div id="app"><div class="center muted">Загрузка…</div></div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbxbCSBcKbG-az-3-_JPJpMLtlQHenJJftHwXM_N-7PvBMfHWVD6xqxDD36nrmtBIz8W/exec';
var APP='tw7prod';
function api(p){ p.app=APP; var q=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]==null?'':p[k]);}).join('&'); return fetch(BASE+'?'+q).then(function(r){return r.json();}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function $(id){ return document.getElementById(id); }
function money(n){ n=Number(n)||0; return n.toFixed(2).replace('.',','); }
var app=$('app'), NEEDS=[], BATCHES=[], MODELS=[], MODMAP={}, DETAIL=null, PULSE=null;
function qp(n){ var m=new RegExp('[?&]'+n+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):''; }
var TGID=qp('tgid')||(function(){try{return localStorage.getItem('tw_tgid')||'';}catch(e){return '';}})();
if(TGID){ try{localStorage.setItem('tw_tgid',TGID);}catch(e){} }
var ROLE='';   // роль для гейтинга панели «ЗП начальника»
function isDir(){ return ROLE==='директор'||ROLE==='админ'; }
function loadRole(){ if(!TGID) return; api({vapi:'me',tgid:TGID}).then(function(r){ if(r&&r.ok&&r.role){ ROLE=r.role; if(VIEW==='detail'&&CUR&&DETAIL&&DETAIL.id===CUR&&isDir()) loadBossPanel(CUR); } }).catch(function(){}); }

function load(){
  app.innerHTML='<div class="center muted">Загрузка…</div>';
  Promise.all([api({vapi:'prodneeds'}), api({vapi:'batches'})]).then(function(res){
    NEEDS=(res[0]&&res[0].rows)||[]; BATCHES=(res[1]&&res[1].batches)||[]; PULSE=(res[1]&&res[1].pulse)||null;
    render();
    if(!MODELS.length) loadModels();
    if(!ROLE) loadRole();
  }).catch(function(e){ app.innerHTML='<div class="center err">Ошибка загрузки: '+esc(e.message||e)+'</div>'; });
}
function loadModels(){
  api({vapi:'catmodels'}).then(function(r){
    MODELS=(r&&r.rows)||[]; MODMAP={}; MODELS.forEach(function(m){ MODMAP[modLabel(m)]=m; });
    var dl=$('modlist'); if(dl) dl.innerHTML=MODELS.map(function(m){ return '<option value="'+esc(modLabel(m))+'">'; }).join('');
  }).catch(function(){});
}
function modLabel(m){ var v=[m.size,m.color,m.kit].filter(Boolean).join(' '); return [m.equip,m.model].filter(Boolean).join(' · ')+(v?(' ('+v+')'):'')+(m.sku?(' — '+m.sku):''); }
function costBadge(s){ if(s==='полностью') return '<span class="pill" style="background:#e7f5ea;color:#137333">✓ посчитано</span>'; if(s==='частично') return '<span class="pill" style="background:#fbf1de;color:#b7791f">~ частично</span>'; return '<span class="pill" style="background:#fdeee7;color:#c0392b">✗ не посчитано</span>'; }

function nm(x){ return [x.equip,x.model].filter(Boolean).join(' · ')||x.sku||'—'; }

var VIEW='list', CUR=null;
function statusPill(st){ var m={'новая':'#eef1f8|#556','в работе':'#eaf1fd|#2b7de9','готово':'#e7f5ea|#137333','отгружено':'#f0edfb|#7c3aed'}; var p=(m[st]||'#eef1f8|#556').split('|'); return '<span class="pill" style="background:'+p[0]+';color:'+p[1]+'">'+esc(st)+'</span>'; }
function statusColor(st){ var m={'новая':'#c3cad9','в работе':'#2b7de9','готово':'#137333','отгружено':'#7c3aed'}; return m[st]||'#c3cad9'; }
function itemName(it){ return [it.equip,it.model].filter(Boolean).join(' · ')||it.sku||'—'; }
function catUrl(x){ return BASE+'?page=catalog&find='+encodeURIComponent(x||''); }   // каталог хаба с фокусом на изделие

function render(){ if(VIEW==='detail'&&CUR){ if(DETAIL&&DETAIL.id===CUR) renderDetail(); else loadDetail(CUR); } else { renderList(); } }
function openOrder(id){ VIEW='detail'; CUR=id; DETAIL=null; app.innerHTML='<div class="center muted">Загрузка заказа…</div>'; window.scrollTo(0,0); if(!MODELS.length) loadModels(); loadDetail(id); }
function backToList(){ VIEW='list'; CUR=null; DETAIL=null; load(); }
// загрузить полный разворот ОДНОГО заказа по требованию (себестоимость/собрано считаются только для него)
function loadDetail(id){
  api({vapi:'batch', batch:id}).then(function(r){
    if(r&&r.ok&&r.batch){ DETAIL=r.batch; if(VIEW==='detail'&&CUR===id) renderDetail(); }
    else { alert((r&&r.error)||'заказ не найден'); backToList(); }
  }).catch(function(e){ app.innerHTML='<div class="center err">Ошибка: '+esc(e.message||e)+'</div>'; });
}
function reloadDetail(){ if(CUR) loadDetail(CUR); }

function needSection(){
  var needRows=NEEDS.map(function(n,i){
    var badge=n.toProduce>0?'<span class="pill p-need">'+n.toProduce+'</span>':'<span class="pill p-ok">0</span>';
    return '<tr><td>'+esc(nm(n))+(n.sku?' <span class="muted">'+esc(n.sku)+'</span>':'')+'</td>'
      +'<td class="num">'+n.sold+'</td><td class="num">'+n.available+'</td><td class="num">'+n.inProduction+'</td>'
      +'<td class="num"><input class="q" id="tg'+i+'" value="'+(n.target||0)+'"> <button class="gray sm" onclick="saveTarget('+i+')">✓</button></td>'
      +'<td class="num">'+badge+'</td></tr>';
  }).join('');
  return '<div class="sect">Потребность к производству <button class="sm" onclick="planNow()">⚙️ Собрать из продаж</button></div>'
    +'<div class="box"><table><thead><tr><th>Товар</th><th class="num">Продано-ждёт</th><th class="num">Доступно</th><th class="num">В произв.</th><th class="num">Целевой запас</th><th class="num">К произв.</th></tr></thead><tbody>'
    +(needRows||'<tr><td colspan=6 class="muted">потребности нет</td></tr>')+'</tbody></table>'
    +'<div class="muted" style="margin-top:8px">«Собрать из продаж» соберёт партию по непроведённым продажам (наличие в резерв, нехватку — в производство).</div></div>';
}

// ── ПУЛЬС / ПРИОРИТЕТ / РИСК (управленческий обзор) ──
function pulseStrip(){
  var p=PULSE; if(!p) return '';
  var tr = p.trend==='up'?'<span style="color:#137333" title="темп растёт">↑</span>':(p.trend==='down'?'<span style="color:#c0392b" title="темп падает">↓</span>':'<span class="muted">→</span>');
  var cap = p.capacityDays!=null ? ('~'+p.capacityDays+' дн') : '—';
  var riskTxt = p.atRisk>0 ? '<b style="color:#c0392b">🔴 в риске: '+p.atRisk+'</b>' : '<span style="color:#137333">✓ все в срок</span>';
  return '<div class="box" style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;font-size:13px;margin-bottom:10px;background:#f6f9ff;border-color:#dbe6fb">'
    +'<span>⚡ <b>Пульс фабрики</b></span>'
    +'<span>сегодня: <b>'+money(p.today)+' ₽</b> труда</span>'
    +'<span>ср/день: <b>'+money(p.avgDay)+' ₽</b> '+tr+'</span>'
    +'<span>'+riskTxt+'</span>'
    +'<span>в работе: <b>'+(p.activeCount||0)+'</b> заказ.</span>'
    +'<span>очередь труда: <b>'+money(p.totalLeft)+' ₽</b> · разгребём за <b>'+cap+'</b></span>'
    +'</div>';
}
function recoLine(){
  var top=null; for(var i=0;i<BATCHES.length;i++){ if(BATCHES[i].top){ top=BATCHES[i]; break; } }
  if(!top) return '';
  var why = top.risk==='late'?('⚠ не успеваем'+(top.slack!=null?(' на '+Math.abs(top.slack)+' дн'):''))
          : top.risk==='tight'?'дедлайн впритык'
          : top.deadline?('дедлайн '+esc(top.deadline)):'наибольший объём';
  return '<div class="box" style="margin-bottom:10px;background:#fffdf3;border-color:#f0e2b8;cursor:pointer" onclick="openOrder(\''+top.id+'\')">'
    +'🎯 <b>Сейчас в приоритете: '+esc(top.num)+' '+esc(top.name)+'</b> — '+why+', осталось <b>'+money(top.leftRub||0)+' ₽</b> труда'+(top.velocity?(' · темп '+money(top.velocity)+' ₽/дн'):'')+' →</div>';
}
function riskBadge(b){
  var r=b.risk;
  if(r==='late') return '<span class="pill" style="background:#fdecea;color:#c0392b" title="прогноз позже дедлайна">🔴 не успеваем'+(b.slack!=null?(' на '+Math.abs(b.slack)+' дн'):'')+'</span>';
  if(r==='tight') return '<span class="pill" style="background:#fbf1de;color:#b7791f" title="мало запаса до дедлайна">🟡 впритык'+(b.slack!=null?(' · запас '+b.slack+' дн'):'')+'</span>';
  if(r==='ok') return '<span class="pill" style="background:#e7f5ea;color:#137333">🟢 успеваем'+(b.forecast?(' к '+esc(b.forecast)):'')+'</span>';
  if(r==='nodeadline') return '<span class="pill" style="background:#eef1f8;color:#556" title="прогноз есть, дедлайн не задан">📅 срок не задан · прогноз '+esc(b.forecast)+'</span>';
  if(r==='unknown') return '<span class="pill" style="background:#eef1f8;color:#556" title="нет подтверждённой выработки — темп неизвестен">⏳ нет темпа</span>';
  if(r==='noops') return '<span class="pill" style="background:#eef1f8;color:#556" title="операции не собраны — прогноз невозможен">⚙️ нет операций</span>';
  if(r==='done') return '<span class="pill" style="background:#e7f5ea;color:#137333">✓ готово</span>';
  return '';
}
function setDeadline(id,cur){
  var d=prompt('Срок (дедлайн) заказа, дд.мм.гггг:', cur||''); if(d===null) return; d=d.trim();
  api({vapi:'renamebatch', batch:id, plan:d}).then(function(r){ if(r&&r.ok) load(); else alert((r&&r.error)||'не сохранилось'); });
}
// ── СПИСОК: компактные карточки-обзор ──
function renderList(){
  var cards=BATCHES.map(function(b){
    var models=(b.items||[]).map(function(it){
      var pct=it.pctLabor||0;
      return '<div class="mrow"><span>'+esc(itemName(it))+' <span class="muted">×'+it.qty+'</span>'+(it.over?' <span class="pill" style="background:#fdecea;color:#c0392b">перевып +'+it.over+'</span>':'')+'</span>'
        +'<span style="min-width:120px;display:flex;align-items:center;gap:8px;justify-content:flex-end">'
        +'<span class="bar" style="width:70px"><i style="width:'+Math.min(100,pct)+'%'+(pct>=100?';background:#137333':'')+'"></i></span>'
        +'<span class="muted" style="font-variant-numeric:tabular-nums;min-width:34px;text-align:right">'+pct+'%</span></span></div>';
    }).join('')||'<div class="muted" style="padding:6px 0">позиций нет</div>';
    var prio=b.prio==='срочно';
    return '<div class="bcard click" style="border-left:5px solid '+(b.risk==='late'?'#c0392b':b.risk==='tight'?'#b7791f':statusColor(b.status))+'" onclick="openOrder(\''+b.id+'\')">'
      +'<div class="bhead" style="padding-bottom:8px;border-bottom:1px solid #eef0f6;margin-bottom:4px">'

        +'<td class="num">'+money(t.needRub)+'</td>'
        +'<td class="num" style="'+(t.leftRub>0?'color:#c0392b':'color:#137333')+'">'+money(t.leftRub)+'</td>'
        +'<td class="num" style="min-width:96px"><span class="bar" style="display:inline-block;width:52px;vertical-align:middle;min-width:0"><i style="width:'+tp+'%'+(tp>=100?';background:#137333':'')+'"></i></span> '+(t.pct||0)+'%</td></tr>';
    }).join('');
    return '<div class="gcard" id="gc_'+id+'_'+gi+'" style="border-left-color:'+color+'">'
      +'<div class="grow" onclick="toggleGroup(\''+id+'\','+gi+')">'
        +'<span class="gcar">▸</span><span class="gname">'+esc(g.group)+'</span>'
        +'<span class="bar"><i style="width:'+pct+'%'+(pct>=100?';background:#137333':'')+'"></i></span>'
        +'<span class="gpct">'+(g.pct||0)+'%</span>'
        +'<span class="gsum">осталось '+money(g.leftRub)+' ₽ · '+g.leftQty+' оп.</span>'
      +'</div>'
      +'<div class="gbody"><table><thead><tr><th>Тип операции</th><th class="num">Нужно</th><th class="num">Сделано</th><th class="num">Остаток</th><th class="num">Нужно ₽</th><th class="num">Остаток ₽</th><th class="num">% вып.</th></tr></thead><tbody>'+opRows+'</tbody></table></div>'
    +'</div>';
  }).join('');
  return cards;
}
function opLeftCss(o){ return o.left>0?'color:#c0392b':'color:#137333'; }
function opLeftHtml(o){ return o.left+(o.over>0?' <span class="pill" style="background:#fdecea;color:#c0392b">+'+o.over+'</span>':''); }
function opProdStat(p){ return (p.pct||0)+'% · осталось '+money(p.leftRub)+' р'; }
function opsKpiHtml(k){
  return '<div class="row" style="gap:14px;margin-bottom:8px;font-weight:700">'
    +'<span>Готовность по труду: <span style="color:#2b7de9">'+(k.pct||0)+'%</span></span>'
    +'<span class="muted" style="font-weight:400">нужно '+money(k.needRub)+' р · сделано '+money(k.doneRub)+' р · осталось '+money(k.leftRub)+' р</span>'
    +(k.overflow?'<span class="pill" style="background:#fdecea;color:#c0392b">⚠ перевыполнение +'+Math.round(k.over)+'</span>':'')+'</div>';
}
// точечное обновление цифр без пересборки таблицы (не трогаем поля, в которых работает пользователь)
var pendingStock={};
function applyOpsNumbers(id,r){
  var box=$('ops_'+id); if(!box) return;
  // структура изменилась (операции добавились/убрались) → честная перерисовка, точечным обновлением не обойтись
  var nOps=0; (r.products||[]).forEach(function(p){ nOps+=(p.ops||[]).length; });
  if(nOps!==box.querySelectorAll('tr[data-op]').length){ renderOps(id,r); return; }
  var kb=$('opskpi_'+id); if(kb) kb.innerHTML=opsKpiHtml(r.kpi||{});
  var cb=$('opschecks_'+id); if(cb) cb.innerHTML=opsChecksHtml(id,r.checks||{});   // проверки пересчитываются целиком
  var oflags=(r.checks&&r.checks.opFlags)||{};
  // агрегатные блоки (участки, заказ по операциям) пересчитываются целиком — в них не вводят; сохраняем раскрытое
  [['opsdash_',opsDashHtml],['opsbyop_',opsByOpHtml]].forEach(function(cfg){
    var b=$(cfg[0]+id); if(!b || !r.dash) return;
    var open={}; Array.prototype.forEach.call(b.querySelectorAll('.gcard.open'), function(c){ open[c.id]=1; });
    b.innerHTML=cfg[1](id,r.dash);
    Array.prototype.forEach.call(b.querySelectorAll('.gcard'), function(c){ if(open[c.id]) c.classList.add('open'); });
  });
  (r.products||[]).forEach(function(p,pi){
    var st=$('opsp_'+id+'_'+pi); if(st) st.innerHTML=opProdStat(p);
    var pp=$('ppct_'+id+'_'+pi); if(pp) pp.textContent=(p.pct||0)+'%';
    var pb=$('pbar_'+id+'_'+pi); if(pb){ var w=Math.min(100,p.pct||0); pb.style.width=w+'%'; pb.style.background=(w>=100?'#137333':''); }
    (p.ops||[]).forEach(function(o){
      var tr=box.querySelector('tr[data-op="'+String(o.id).replace(/"/g,'\\"')+'"]'); if(!tr) return;
      var d=tr.querySelector('.c-done'); if(d) d.textContent=o.done;
      var l=tr.querySelector('.c-left'); if(l){ l.setAttribute('style',opLeftCss(o)); l.innerHTML=opLeftHtml(o); }
      var f1=tr.querySelector('td'), cur=f1&&f1.querySelector('.chk'), sev=oflags[o.id];   // значок ⚠ на строке
      if(sev){ if(!cur){ cur=document.createElement('span'); cur.textContent=' ⚠'; cur.title='нажми — показать замечание'; cur.onclick=(function(oid){return function(){ showOpIssues(id,oid); };})(o.id); f1.appendChild(cur);} cur.className='chk '+sev; }
      else if(cur){ cur.parentNode.removeChild(cur); }
      var inp=tr.querySelector('.c-stock');
      // поле обновляем только если пользователь в нём не работает и по нему нет несохранённой правки
      if(inp && !pendingStock[o.id] && document.activeElement!==inp && Number(inp.value)!==Number(o.stock||0)) inp.value=(o.stock||0);
    });
  });
}
function stockKey(ev,inp){
  if(ev.key!=='Enter') return;
  ev.preventDefault(); inp.blur();                       // Enter = сохранить и перейти к следующему полю
  var all=Array.prototype.slice.call(document.querySelectorAll('.c-stock'));
  var i=all.indexOf(inp); if(i>=0&&i<all.length-1){ all[i+1].focus(); all[i+1].select(); }
}
function setStock(batchId,opId,val,inp,force){
  pendingStock[opId]=true;
  if(inp){ inp.style.background='#fffbe6'; }             // жёлтый = сохраняется
  api({vapi:'setopstock',op:opId,stock:val,force:force?1:''}).then(function(r){
    delete pendingStock[opId];
    if(r&&r.warn){                                       // предупреждение (остаток>нужного) — разрешаем через confirm
      if(inp) inp.style.background='';
      if(confirm(r.msg||'Значение больше, чем нужно. Записать всё равно?')) setStock(batchId,opId,val,inp,true);
      else loadOps(batchId);                             // отказ → вернуть фактическое значение
      return;
    }
    if(r&&r.ok){
      if(inp){ inp.style.background='#eafaef'; setTimeout(function(){ inp.style.background=''; },700); }
      applyOpsNumbers(batchId,r);                        // только цифры, без пересборки
    } else {
      if(inp){ inp.style.background='#fdecea'; }
      alert((r&&r.error)||'не сохранилось');
      loadOps(batchId);                                  // не оставляем протухшие цифры — пересинхронизируем
    }
  }).catch(function(e){ delete pendingStock[opId]; if(inp){ inp.style.background='#fdecea'; } alert('Ошибка: '+(e.message||e)); });
}
function planNow(){
  api({vapi:'planprod'}).then(function(r){
    if(!r||!r.ok){ alert((r&&r.error)||'не удалось спланировать'); return; }
    load();
  }).catch(function(e){ alert('Ошибка: '+(e.message||e)); });
}
function saveTarget(i){
  var n=NEEDS[i], v=$('tg'+i).value;
  api({vapi:'settarget', sku:n.sku||'', target:v, min:'', eq:n.equip||'', mod:n.model||''}).then(function(){ load(); });
}
function setStatus(id,st){ api({vapi:'setbstatus', batch:id, status:st}).then(function(){ if(VIEW==='detail') reloadDetail(); else load(); }); }
function togglePrio(id,on){ api({vapi:'setprio', batch:id, prio:on?'срочно':'обычный'}).then(function(){ if(VIEW==='detail') reloadDetail(); else load(); }); }
function saveDone(id,sku,mod,v){
  var m=$('bm_'+id); if(m) m.textContent='…';
  api({vapi:'batchdone', batch:id, sku:sku, mod:mod, done:v}).then(function(r){
    if(m) m.innerHTML=(r&&r.ok)?'<span class="ok">✓ на склад</span>':'<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; setTimeout(reloadDetail,700);
  });
}
function newBatch(){ var nm=prompt('Название заказа (или пусто — авто):',''); if(nm===null) return; api({vapi:'createbatch', name:nm}).then(function(r){ if(r&&r.ok){ openOrder(r.batchId); } else alert('Ошибка'); }); }
function renameBatch(id,cur){ var nm=prompt('Название партии:',cur||''); if(nm===null||!nm.trim()) return; api({vapi:'renamebatch', batch:id, name:nm.trim()}).then(function(){ if(VIEW==='detail') reloadDetail(); else load(); }); }
function delBatch(id){ if(!confirm('Удалить заказ со всеми позициями?')) return; api({vapi:'delbatch', batch:id}).then(function(){ backToList(); }); }
// строка позиции (общий шаблон для рендера и оптимистичного добавления)
function itemRowHtml(it,batchId){
  var asmBadge = it.assembled
    ? '<span class="asm ok" title="собрано">✓<span class="t">собрано</span></span>'
    : '<a href="'+catUrl(it.sku||it.model)+'" target="_blank" class="asm no" title="не собрано — открыть в каталоге, проверить состав и отметить">⚠<span class="t">не собрано → открыть в каталоге</span></a>';
  return '<tr data-item="'+esc(it.id)+'"><td>'+esc(itemName(it))+(it.sku?' <span class="muted">'+esc(it.sku)+'</span>':'')+'</td>'
    +'<td>'+asmBadge+(it.unitCost?' <span class="muted">'+it.unitCost.toFixed(2).replace('.',',')+' р/шт</span>':'')+'</td>'
    +'<td class="num"><input class="q" value="'+it.qty+'" onchange="updItem(\''+it.id+'\',this.value)"></td>'
    +'<td class="num"><input class="q" value="'+(it.done||0)+'" onchange="saveDone(\''+batchId+'\',\''+esc(it.sku)+'\',\''+esc(it.model)+'\',this.value)"></td>'
    +'<td><button class="gray sm" title="убрать" onclick="rmItem(\''+it.id+'\')">🗑</button></td></tr>';
}
function curBatch(id){ if(DETAIL&&DETAIL.id===id) return DETAIL; for(var i=0;i<BATCHES.length;i++) if(BATCHES[i].id===id) return BATCHES[i]; return null; }
function renderItems(id){ var b=curBatch(id), tb=$('items_'+id); if(b&&tb) tb.innerHTML=(b.items||[]).map(function(it){ return itemRowHtml(it,id); }).join(''); }
// операции — редкое обновление: пересобираем один раз через паузу после последнего изменения позиций (expand дорогой)
var _opsTimer=null;
function scheduleOpsRefresh(id){ var box=$('ops_'+id); if(box) box.innerHTML='<div class="muted">операции обновятся…</div>'; if(_opsTimer) clearTimeout(_opsTimer); _opsTimer=setTimeout(function(){ loadOps(id); },2500); }

function addItem(id){
  var el=$('am_'+id), lbl=el.value.trim(), qEl=$('aq_'+id), qty=Number(qEl.value), m=$('bm_'+id);
  var mod=MODMAP[lbl];
  if(!mod){ if(m) m.innerHTML='<span class="err">выберите модель из списка</span>'; return; }
  if(!(qty>0)){ if(m) m.innerHTML='<span class="err">укажите количество</span>'; return; }
  var b=curBatch(id); if(!b) return;
  var it={ id:'tmp'+Date.now(), sku:mod.sku, equip:mod.equip, model:mod.model, qty:qty, done:0, costing:mod.costing, unitCost:mod.cost, assembled:!!mod.assembled };
  b.items=b.items||[]; b.items.push(it);
  renderItems(id);                       // мгновенно показать позицию
  el.value=''; qEl.value=''; el.focus();  // готово вводить следующую
  if(m) m.innerHTML='<span class="ok">＋ '+esc(itemName(it))+'</span>';
  api({vapi:'additem', batch:id, sku:mod.sku, eq:mod.equip, mod:mod.model, qty:qty}).then(function(r){
    if(r&&r.ok&&r.item){ it.id=r.item.id; renderItems(id); scheduleOpsRefresh(id); }
    else { b.items=b.items.filter(function(x){ return x!==it; }); renderItems(id); if(m) m.innerHTML='<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; }
  }).catch(function(e){ b.items=b.items.filter(function(x){ return x!==it; }); renderItems(id); if(m) m.innerHTML='<span class="err">'+esc(e.message||e)+'</span>'; });
}
function updItem(itemId,v){
  var b=DETAIL; if(!b||!b.items) return;
  for(var j=0;j<b.items.length;j++) if(b.items[j].id===itemId){ b.items[j].qty=Number(v)||0; api({vapi:'upditem', item:itemId, qty:v}).then(function(){ scheduleOpsRefresh(b.id); }); return; }
}
function rmItem(itemId){
  var b=DETAIL; if(!b||!b.items) return;
  for(var j=0;j<b.items.length;j++) if(b.items[j].id===itemId){ b.items.splice(j,1); renderItems(b.id); (function(bid){ api({vapi:'rmitem', item:itemId}).then(function(){ scheduleOpsRefresh(bid); }); })(b.id); return; }
}
function ship(id){ var m=$('bm_'+id); m.textContent='…'; api({vapi:'shipbatch', batch:id}).then(function(r){ m.innerHTML=(r&&r.ok)?'<span class="ok">отгружено '+(r.shipped||0)+'</span>':'<span class="err">ошибка</span>'; setTimeout(reloadDetail,700); }); }

load();
</script>
</body>
