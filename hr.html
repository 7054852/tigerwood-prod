<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тигервуд — Кадры</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#fff; --fg:#1b2333; --muted:#8a93a6; --line:#e6e9f2; --accent:#2b7de9;
    --green:#137333; --green-bg:#e7f5ea; --amber:#b7791f; --amber-bg:#f7efdb; --red:#c0392b; --red-bg:#fdecea; --grid:#eef1f8;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#14161b; --card:#1c1f26; --fg:#e9eaee; --muted:#9aa0ad; --line:#2a2e37; --accent:#4f9bee;
           --green:#4bbd7e; --green-bg:#13291d; --amber:#d6a23c; --amber-bg:#2c2411; --red:#e5776b; --red-bg:#2b1714; --grid:#23262e; }
  }
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);}
  body{ font-family:-apple-system,Roboto,Segoe UI,Arial,sans-serif; color:var(--fg); padding:14px; max-width:1000px; margin:0 auto; font-size:14px; }
  html.emb>body>.hi,html.emb>body>.sub{display:none}
  .hi{ font-size:19px; font-weight:800; } .sub{ color:var(--muted); font-size:13px; margin-top:2px; }
  .muted{ color:var(--muted); } .center{ text-align:center; padding:40px 16px; color:var(--muted); }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px; box-shadow:0 1px 3px rgba(20,30,60,.05); margin-bottom:10px; }
  .sect{ font-size:12.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:18px 4px 8px; }
  .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 12px; }
  .tabs button{ border:1px solid var(--line); background:var(--card); color:var(--fg); border-radius:999px; padding:7px 13px; font-size:13px; cursor:pointer; font-weight:600; }
  .tabs button.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .tabs button .b{ background:var(--red); color:#fff; border-radius:999px; padding:0 6px; margin-left:5px; font-size:11px; }
  .tabs button.on .b{ background:rgba(255,255,255,.25); }
  table{ width:100%; border-collapse:collapse; } th,td{ text-align:left; padding:7px 9px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top; }
  th{ color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.03em; }
  td.num,th.num{ text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  tr.click:hover td{ background:rgba(127,140,170,.07); cursor:pointer; }
  .tbwrap{ overflow-x:auto; }
  .pill{ display:inline-block; border-radius:999px; padding:2px 9px; font-size:11.5px; font-weight:700; white-space:nowrap; }
  .p-red{ background:var(--red-bg); color:var(--red); } .p-amber{ background:var(--amber-bg); color:var(--amber); }
  .p-ok{ background:var(--green-bg); color:var(--green); } .p-none{ background:var(--grid); color:var(--muted); }
  .btn{ border:1px solid var(--line); background:var(--card); color:var(--fg); border-radius:9px; padding:6px 11px; font-size:13px; cursor:pointer; font-weight:600; }
  .btn.pri{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.sm{ padding:3px 8px; font-size:12px; }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:9px; }
  label.f{ display:block; font-size:11.5px; color:var(--muted); margin-bottom:3px; }
  input,select,textarea{ width:100%; padding:7px 9px; border:1px solid var(--line); border-radius:9px; background:var(--card); color:var(--fg); font-size:13px; font-family:inherit; }
  .steps{ margin-top:4px; }
  .step{ display:flex; gap:9px; align-items:flex-start; padding:7px 0; border-bottom:1px dashed var(--line); }
  .step.done .t{ color:var(--muted); text-decoration:line-through; }
  .step .n{ width:22px; color:var(--muted); font-variant-numeric:tabular-nums; font-size:12px; padding-top:2px; }
  .step .t{ flex:1; min-width:120px; } .step .w{ font-size:11.5px; color:var(--muted); }
  .step .due{ font-size:11.5px; } .step .due.late{ color:var(--red); font-weight:700; }
  .chk{ width:20px; height:20px; flex:0 0 20px; border:1.5px solid var(--line); border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; }
  .step.done .chk{ background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .back{ cursor:pointer; color:var(--accent); font-weight:600; font-size:13px; }
  .kv{ display:grid; grid-template-columns:auto 1fr; gap:3px 12px; font-size:13px; }
  .kv .k{ color:var(--muted); }
  .empty{ color:var(--muted); font-size:12.5px; padding:8px 0; }
  /* обязательные для печати поля: помечены звёздочкой, красные пока пустые */
  .fld.req label.f:after{ content:' *'; color:var(--red); font-weight:700; }
  .fld.req.bad input,.fld.req.bad select{ border-color:var(--red); background:var(--red-bg); }
  .fld.req.bad label.f{ color:var(--red); }
  .reqhint{ font-size:12px; color:var(--red); margin-top:8px; }
  .misline{ color:var(--red); margin-top:2px; } .misline b{ font-weight:700; }
  a{ color:var(--accent); }
</style>
</head>
<body>
<div class="hi">🧾 Кадры</div>
<div class="sub">Сотрудники и подрядчики: договоры, приказы, сроки уведомлений, чек-листы оформления.</div>
<div id="app"><div class="center">Загрузка…</div></div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbxbCSBcKbG-az-3-_JPJpMLtlQHenJJftHwXM_N-7PvBMfHWVD6xqxDD36nrmtBIz8W/exec';
var APP='tw7prod';
if(/[?&]embed=1/.test(location.search))document.documentElement.classList.add('emb');
function qp(n){ var m=new RegExp('[?&]'+n+'=([^&]*)').exec(location.search); return m?decodeURIComponent(m[1]):''; }
var TGID=qp('tgid')||'';
try{ if(!TGID && window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) TGID=String(Telegram.WebApp.initDataUnsafe.user.id); }catch(e){}
function api(p){ p.app=APP; if(TGID&&!p.tgid)p.tgid=TGID;
  var q=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]==null?'':p[k]);}).join('&');
  return fetch(BASE+'?'+q).then(function(r){return r.json();}); }
function apiPost(p){ p.app=APP; if(TGID&&!p.tgid)p.tgid=TGID;
  var body=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]==null?'':p[k]);}).join('&');
  return fetch(BASE,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).then(function(r){return r.json();}); }
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function money(n){ return (Number(n)||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}); }

var TAB='dl', DATA=null, CARD=null;
var TABS=[{id:'dl',t:'⏱ Сроки'},{id:'emp',t:'👤 Сотрудники'},{id:'con',t:'📑 Договоры'},{id:'ord',t:'📜 Приказы'},
          {id:'sick',t:'🏥 Больничные'},{id:'doc',t:'🗂 Документы'},{id:'fuel',t:'⛽ Топливо'}];

// ВСЁ грузится одним запросом (вызов GAS стоит секунды) — вкладки и карточки дальше открываются мгновенно, без сети
function apply(r,keepCardId){
  if(!r||!r.ok){ alert((r&&r.error)||'ошибка'); return false; }
  DATA=r; CARD=keepCardId?buildCard(keepCardId):null; render(); return true;
}
function load(force){
  $('app').innerHTML='<div class="center">Загрузка…</div>';
  api(force?{vapi:'hrall',force:1}:{vapi:'hrall'}).then(function(r){
    if(!r||!r.ok){ $('app').innerHTML='<div class="center">Ошибка: '+esc((r&&r.error)||'нет данных')+'</div>'; return; }
    DATA=r; render();
  }).catch(function(e){ $('app').innerHTML='<div class="center">Сеть: '+esc(e.message)+'</div>'; });
}
function go(tab){ TAB=tab; CARD=null; render(); }
// карточка собирается из уже загруженного пакета — ноль запросов
function buildCard(empId){
  var row=(DATA.list||[]).filter(function(x){return x.emp.id===empId;})[0];
  if(!row) return null;
  var cons=(DATA.contracts||[]).filter(function(c){return c.emp===empId;});
  var conIds={}; cons.forEach(function(c){conIds[c.id]=1;});
  return { ok:true, emp:row.emp, contracts:cons,
    ds:(DATA.ds||[]).filter(function(d){return conIds[d.con];}),
    orders:(DATA.orders||[]).filter(function(o){return o.emp===empId;}),
    sick:(DATA.sick||[]).filter(function(x){return x.emp===empId;}),
    fuel:(DATA.fuel||[]).filter(function(x){return x.emp===empId;}),
    steps:(DATA.steps||[]).filter(function(s){return s.emp===empId;}),
    processes:DATA.processes||[] };
}
function sevPill(s){ var m={red:'🔴',amber:'🟡',ok:'🟢',none:'—'}; return '<span class="pill p-'+(s||'none')+'">'+(m[s]||'—')+'</span>'; }

function render(){
  var red=(DATA.deadlines||[]).filter(function(x){return x.sev==='red';}).length;
  var h='<div class="tabs">'+TABS.map(function(t){
    return '<button class="'+(TAB===t.id?'on':'')+'" onclick="go(\''+t.id+'\')">'+t.t+(t.id==='dl'&&red?'<span class="b">'+red+'</span>':'')+'</button>';
  }).join('')+'<button onclick="load(1)" title="перечитать с сервера">⟳</button>'+
  (DATA.cached?'<span class="muted" style="align-self:center;font-size:11.5px">данные из кеша</span>':'')+'</div>';
  if(CARD) h+=cardView(); else if(TAB==='dl') h+=dlView();
  else if(TAB==='emp') h+=empView();
  else if(TAB==='con') h+=conRegView();
  else if(TAB==='ord') h+=ordView();
  else if(TAB==='sick') h+=sickView();
  else if(TAB==='doc') h+=docView();
  else if(TAB==='fuel') h+=fuelView();
  $('app').innerHTML=h;
}

/* ─── Сроки ─── */
function dlView(){
  var d=DATA.deadlines||[];
  if(!d.length) return '<div class="card"><b>✓ Всё в порядке</b><div class="muted" style="margin-top:4px">Нет истекающих договоров и просроченных шагов оформления.</div></div>';
  return '<div class="card tbwrap"><table><thead><tr><th></th><th>Кто</th><th>Что</th><th>Ответственный</th><th>Комментарий</th></tr></thead><tbody>'+
    d.map(function(x){
      return '<tr class="click" onclick="openCard(\''+x.empId+'\')"><td>'+sevPill(x.sev)+'</td><td><b>'+esc(x.fio)+'</b></td>'+
        '<td>'+esc(x.title)+'</td><td class="muted">'+esc(x.who||'')+'</td><td>'+esc(x.msg)+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}

/* ─── Сотрудники ─── */
function empView(){
  var l=DATA.list||[];
  var h='<div class="row" style="margin-bottom:8px"><button class="btn pri" onclick="newEmp()">+ Сотрудник</button>'+
        '<span class="muted">всего: '+l.length+'</span></div>';
  h+='<div class="card tbwrap"><table><thead><tr><th></th><th>ФИО</th><th>Тип</th><th>Должность</th><th>Договор</th><th>Окончание</th><th>Оформление</th><th>Статус</th></tr></thead><tbody>';
  h+=l.map(function(x){
    var e=x.emp,c=x.contract||{},p=x.steps||{};
    return '<tr class="click" onclick="openCard(\''+e.id+'\')"><td>'+sevPill(x.state.sev)+'</td>'+
      '<td><b>'+esc(e.fio)+'</b></td><td class="muted">'+esc(e.type)+'</td><td>'+esc(e.pos||'—')+'</td>'+
      '<td class="muted">'+esc(c.num?((c.kind||'')+' №'+c.num):'—')+'</td><td>'+esc(c.end||'—')+'</td>'+
      '<td class="muted">'+(p.total?(p.done+'/'+p.total):'—')+'</td><td class="muted">'+esc(e.status||'')+'</td></tr>';
  }).join('');
  return h+'</tbody></table></div>';
}

/* ─── Карточка ─── */
function openCard(id){ CARD=buildCard(id); if(!CARD){ alert('сотрудник не найден'); return; } render(); window.scrollTo(0,0); }
function closeCard(){ CARD=null; render(); }
function cardView(){
  var e=CARD.emp;
  var h='<div class="back" onclick="closeCard()">← к списку</div>';
  h+='<div class="card" style="margin-top:8px"><div class="row" style="justify-content:space-between">'+
     '<div><div style="font-size:17px;font-weight:800">'+esc(e.fio)+'</div>'+
     '<div class="muted">'+esc(e.type||'тип по договору не определён')+' · '+esc(e.pos||'должность не указана')+(e.posCode?' ('+esc(e.posCode)+')':'')+' · '+esc(e.status||'')+
     ' <span style="font-size:11px">(из договора)</span></div></div>'+
     '<div class="row">'+(e.folder?'<a class="btn sm" href="'+esc(e.folder)+'" target="_blank">📁 папка</a>'
        :'<button class="btn sm" onclick="mkFolder()">📁 создать папку</button>')+
     '<button class="btn sm" onclick="editEmp()">✎ править</button></div></div>';
  h+='<div class="grid" style="margin-top:10px"><div class="kv"><div class="k">Идент. номер</div><div>'+esc(e.idnum||'—')+'</div>'+
     '<div class="k">Паспорт</div><div>'+esc(e.passport||'—')+'</div><div class="k">Р/с</div><div>'+esc(e.account||'—')+'</div></div>'+
     '<div class="kv"><div class="k">Принят</div><div>'+esc(e.hired||'—')+'</div><div class="k">Уволен</div><div>'+esc(e.fired||'—')+'</div>'+
     '<div class="k">Telegram</div><div>'+esc(e.tgId||'—')+'</div></div></div></div>';

  // договоры
  h+='<div class="sect">Договоры</div><div class="card tbwrap">';
  if(!CARD.contracts.length) h+='<div class="empty">Нет договоров.</div>';
  else h+='<table><thead><tr><th></th><th>Вид</th><th>№</th><th>Дата</th><th>Окончание</th><th>Уведомление</th><th>Ответ</th><th>Статус</th><th></th></tr></thead><tbody>'+
    CARD.contracts.map(function(c){
      var acts='<button class="btn sm" onclick=\'editCon('+JSON.stringify(c).replace(/'/g,"&#39;")+')\'>✎</button>'+
        ' <button class="btn sm" onclick="genDoc(\''+c.id+'\')" title="сформировать по шаблону">🖨</button>'+
        ' <button class="btn sm" onclick="uploadDoc(\''+c.id+'\')" title="загрузить готовый: фото/скан/PDF">📎</button>'+
        (c.kind==='контракт'?' <button class="btn sm" onclick="genDoc(\''+c.id+'\',\'приказ-приём\')" title="приказ о приёме">📜</button>':'');
      return '<tr><td>'+dot(c.missing)+sevPill((c.state||{}).sev)+'</td><td>'+esc(c.kind)+'</td><td><b>'+esc(c.num)+'</b></td><td>'+esc(c.date)+'</td>'+
        '<td>'+esc(c.end||'—')+'</td><td>'+esc(c.notify||'—')+'</td><td>'+esc(c.answer||'—')+'</td><td class="muted">'+esc(c.status)+'</td>'+
        '<td style="white-space:nowrap">'+acts+'</td></tr>'+
        '<tr><td></td><td colspan="8" class="muted" style="font-size:12px;border-bottom:1px solid var(--line)">'+esc((c.state||{}).msg||'')+
        (function(){ var mk=c.missingKeys||[]; if(!mk.length) return '';
          var inCon=mk.filter(function(x){return x.src==='con';}).map(function(x){return x.t;});
          var inEmp=mk.filter(function(x){return x.src==='emp';}).map(function(x){return x.t;});
          return '<div class="misline">'+
            (inCon.length?'● в договоре: <b>'+esc(inCon.join(', '))+'</b> ':'')+
            (inEmp.length?'● в карточке сотрудника: <b>'+esc(inEmp.join(', '))+'</b>':'')+'</div>'; })()+
        ((c.files&&c.files.length)?'<div style="margin-top:2px">файлы: '+c.files.map(function(u,i){return '<a href="'+esc(u)+'" target="_blank">стр. '+(i+1)+'</a>';}).join(' · ')+'</div>':'')+
        '</td></tr>';
    }).join('')+'</tbody></table>';
  h+='<div class="row" style="margin-top:8px"><button class="btn" onclick="newCon(\'контракт\')">+ контракт (штат)</button>'+
     '<button class="btn" onclick="newCon(\'подряд\')">+ договор подряда</button>'+
     '<span class="muted" style="font-size:12px">папка сотрудника создаётся автоматически при добавлении договора</span></div></div>';

  // доп. соглашения
  if(CARD.ds.length){
    h+='<div class="sect">Доп. соглашения</div><div class="card tbwrap"><table><thead><tr><th>№</th><th>Дата</th><th>Основание</th><th>Уведомление</th><th>Ответ</th></tr></thead><tbody>'+
      CARD.ds.map(function(d){ return '<tr><td>'+esc(d.num||'—')+'</td><td>'+esc(d.date||'—')+'</td><td>'+esc(d.reason||'')+'</td><td>'+esc(d.notify||'—')+'</td><td>'+esc(d.answer||'—')+'</td></tr>'; }).join('')+
      '</tbody></table></div>';
  }
  // приказы
  if(CARD.orders.length){
    h+='<div class="sect">Приказы</div><div class="card tbwrap"><table><thead><tr><th>№</th><th>Дата</th><th>Вид</th><th>Основание</th></tr></thead><tbody>'+
      CARD.orders.map(function(o){ return '<tr><td><b>'+esc(o.num)+'</b></td><td>'+esc(o.date||'—')+'</td><td>'+esc(o.kind||'')+'</td><td class="muted">'+esc(o.basis||'')+'</td></tr>'; }).join('')+
      '</tbody></table></div>';
  }
  // чек-лист
  h+='<div class="sect">Оформление — чек-лист по регламенту</div>';
  if(!CARD.steps.length){
    h+='<div class="card"><div class="empty">Чек-лист не запущен.</div><div class="row">'+
       CARD.processes.map(function(p){ return '<button class="btn sm" onclick="startProc(\''+p+'\')">▶ '+esc(p)+'</button>'; }).join('')+'</div></div>';
  } else {
    var byProc={}; CARD.steps.forEach(function(s){ (byProc[s.proc]=byProc[s.proc]||[]).push(s); });
    Object.keys(byProc).forEach(function(p){
      var ss=byProc[p], done=ss.filter(function(s){return s.status==='сделано';}).length;
      h+='<div class="card"><div class="row" style="justify-content:space-between"><b>'+esc(p)+'</b>'+
         '<span class="muted">'+done+' / '+ss.length+'</span></div><div class="steps">'+
        ss.map(function(s){
          var late=s.due&&s.status!=='сделано'&&isLate(s.due);
          return '<div class="step '+(s.status==='сделано'?'done':'')+'">'+
            '<div class="chk" onclick="toggleStep(\''+s.id+'\','+(s.status==='сделано'?1:0)+')">'+(s.status==='сделано'?'✓':'')+'</div>'+
            '<div class="n">'+s.step+'</div><div class="t">'+esc(s.title)+
            '<div class="w">'+esc(s.who)+(s.date?' · '+esc(s.date):'')+
            (s.due?' · <span class="due'+(late?' late':'')+'">срок '+esc(s.due)+'</span>':'')+
            (s.link?' · <a href="'+esc(s.link)+'" target="_blank">артефакт</a>':'')+'</div></div></div>';
        }).join('')+'</div></div>';
    });
    var have={}; CARD.steps.forEach(function(s){have[s.proc]=1;});
    var rest=CARD.processes.filter(function(p){return !have[p];});
    if(rest.length) h+='<div class="card"><div class="row">'+rest.map(function(p){
      return '<button class="btn sm" onclick="startProc(\''+p+'\')">▶ запустить: '+esc(p)+'</button>'; }).join('')+'</div></div>';
  }
  return h;
}
function isLate(due){ var p=String(due).split('.'); if(p.length!==3) return false;
  var d=new Date(+p[2],+p[1]-1,+p[0]); var t=new Date(); t.setHours(0,0,0,0); return d<t; }
function busy(t){ var e=$('app'); if(e) e.style.opacity=t?'.5':''; }
function toggleStep(id,done){ var eid=CARD.emp.id; busy(1);
  api({vapi:'hrstepdone',step:id,undo:done?1:0}).then(function(r){ busy(0); apply(r,eid); }); }
function startProc(p){ var eid=CARD.emp.id; busy(1);
  api({vapi:'hrstartproc',emp:eid,proc:p,date:CARD.emp.hired||''}).then(function(r){ busy(0); apply(r,eid); }); }
function mkFolder(){ var eid=CARD.emp.id; busy(1);
  api({vapi:'hrfolder',emp:eid}).then(function(r){ busy(0); apply(r,eid); }); }

/* ─── формы ─── */
var REQKEYS={};   // какие поля обязательны в текущей форме (заполняется перед показом)
function fld(k,l,v,type){
  var rq=REQKEYS[k]?' req'+(String(v||'').trim()?'':' bad'):'';
  return '<div class="fld'+rq+'" id="w_'+k+'"><label class="f">'+l+'</label><input id="f_'+k+'" value="'+esc(v||'')+'"'+(type?' type="'+type+'"':'')+' oninput="markReq(\''+k+'\')"></div>';
}
function sel(k,l,v,opts,onch){ return '<div class="fld" id="w_'+k+'"><label class="f">'+l+'</label><select id="f_'+k+'"'+(onch?' onchange="'+onch+'"':'')+'>'+
  opts.map(function(o){ return '<option'+(o===v?' selected':'')+'>'+esc(o)+'</option>'; }).join('')+'</select></div>'; }
function markReq(k){ var w=$('w_'+k);
  if(w&&REQKEYS[k]){ if(($('f_'+k).value||'').trim()) w.classList.remove('bad'); else w.classList.add('bad'); }
  updHint(); }
function reqSet(kind,src){ var o={}; ((DATA.req&&DATA.req[src]&&DATA.req[src][kind])||[]).forEach(function(f){ o[f[0]]=f[1]; }); return o; }
function reqLeft(){ return Object.keys(REQKEYS).filter(function(k){ var e=$('f_'+k); return e&&!(e.value||'').trim(); })
  .map(function(k){ return REQKEYS[k]; }); }
function reqHint(){ var l=reqLeft(); return l.length?('<div class="reqhint">● отмеченные поля нужны, чтобы сформировать документ по шаблону. Осталось: '+esc(l.join(', '))+'</div>'):''; }
function val(k){ var el=$('f_'+k); return el?el.value.trim():''; }
function dlg(title,body,onsave,note){
  var h='<div class="card"><b>'+esc(title)+'</b><div class="grid" style="margin-top:9px">'+body+'</div>'+
    '<div id="reqHint"></div>'+(note||'')+
    '<div class="row" style="margin-top:10px"><button class="btn pri" id="dlgSave">Сохранить</button>'+
    '<button class="btn" onclick="'+(CARD?'openCard(\''+CARD.emp.id+'\')':'load()')+'">Отмена</button></div></div>';
  $('app').innerHTML=h; $('dlgSave').onclick=onsave; updHint();
}
function updHint(){ var e=$('reqHint'); if(e) e.innerHTML=reqHint(); }
function newEmp(){ empForm({}); }
function editEmp(){ empForm(CARD.emp); }
function empForm(e){
  // тип (штат/подряд), должность, код, даты приёма и увольнения задаются В ДОГОВОРЕ и выводятся из него
  var t=(e.type==='подряд')?'подряд':(e.type==='штат'?'контракт':null);
  REQKEYS = t? reqSet(t,'emp') : (function(){ var a=reqSet('контракт','emp'), b=reqSet('подряд','emp');
    Object.keys(b).forEach(function(k){ a[k]=b[k]; }); return a; })();
  dlg(e.id?'Правка сотрудника':'Новый сотрудник',
    fld('fio','ФИО',e.fio)+fld('fioR','ФИО в родительном (кого)',e.fioR)+fld('fioT','ФИО в творительном (с кем)',e.fioT)+
    fld('birth','Дата рождения',e.birth)+fld('idnum','Идент. номер',e.idnum)+
    fld('passport','Паспорт (серия и номер)',e.passport)+fld('passDate','Паспорт выдан',e.passDate)+fld('passOrg','Орган выдачи',e.passOrg)+
    fld('addr','Адрес регистрации',e.addr)+fld('account','Р/с (Беларусбанк)',e.account)+
    fld('phone','Телефон',e.phone)+fld('tgId','Telegram ID',e.tgId)+fld('note','Примечание',e.note),
    function(){
      var d={id:e.id||'',fio:val('fio'),fioR:val('fioR'),fioT:val('fioT'),birth:val('birth'),idnum:val('idnum'),
             passport:val('passport'),passDate:val('passDate'),passOrg:val('passOrg'),addr:val('addr'),account:val('account'),
             phone:val('phone'),tgId:val('tgId'),note:val('note')};
      if(!d.fio){ alert('Укажите ФИО'); return; }
      busy(1); api({vapi:'hrsaveemp',data:JSON.stringify(d)}).then(function(r){ busy(0); apply(r,d.id||r.savedId); });
    });
}
function newCon(kind){
  var today=new Date(), d=('0'+today.getDate()).slice(-2)+'.'+('0'+(today.getMonth()+1)).slice(-2)+'.'+today.getFullYear();
  var c={emp:CARD.emp.id,kind:kind||(CARD.emp.type==='подряд'?'подряд':'контракт'),date:d,
         wStart:'09:00',wBreak:'13:00 по 14:00',wEnd:'18:00',vacMain:24,vacExtra:1,termText:'1 (один) год'};
  busy(1);
  api({vapi:'hrnextnums',date:d}).then(function(r){ busy(0);
    if(r&&r.ok) c.num = (c.kind==='подряд')? r.podryad : r.contract;
    conForm(c);
  });
}
function editCon(c){ conForm(c); }
var CONDRAFT=null;
function conKindChange(){
  var d=CONDRAFT||{}; Object.keys(REQKEYS).concat(['kind','num','date','end','pos','posCode','salary','tariff','advance','rate',
    'termText','wStart','wBreak','wEnd','vacMain','vacExtra','workTime','status','termDate','notify','answer','link','note'])
    .forEach(function(k){ var e=$('f_'+k); if(e) d[k]=e.value; });
  d.kind=$('f_kind').value; conForm(d);
}
function conForm(c){
  CONDRAFT=c;
  var isP=(c.kind==='подряд');
  REQKEYS = reqSet(isP?'подряд':'контракт','con');
  // для подряда поля трудового контракта (оклад, отпуск, режим дня) не применяются и не показываются
  var body=sel('kind','Вид',c.kind||'контракт',['контракт','подряд'],'conKindChange()')+fld('num','№ (пусто = следующий по счётчику)',c.num)+
    fld('date','Дата',c.date)+fld('end',isP?'Окончание работ':'Дата окончания',c.end)+
    fld('pos',isP?'Виды работ':'Должность',c.pos)+
    (isP?'':fld('posCode','Код должности (из штатного)',c.posCode)+
      fld('salary','Оклад',c.salary)+fld('tariff','Тарифный оклад',c.tariff)+fld('advance','Аванс',c.advance)+
      fld('termText','Срок (текстом: 1 (один) год)',c.termText)+
      fld('wStart','Начало рабочего дня',c.wStart)+fld('wBreak','Перерыв',c.wBreak)+fld('wEnd','Конец рабочего дня',c.wEnd)+
      fld('vacMain','Отпуск основной, дней',c.vacMain)+fld('vacExtra','Отпуск дополнительный, дней',c.vacExtra)+
      fld('workTime','Режим (текстом)',c.workTime))+
    fld('rate','Ставка',c.rate)+
    sel('status','Статус',c.status||'действует',['действует','истёк','расторгнут','продлён'])+
    fld('termDate','Дата прекращения',c.termDate)+fld('notify','Уведомление (дата)',c.notify)+fld('answer','Ответ на уведомление',c.answer)+
    fld('link','Ссылка на документ',c.link)+fld('note','Примечание',c.note);
  var empMiss=(function(){ var e=CARD&&CARD.emp; if(!e) return [];
    return Object.keys(reqSet(isP?'подряд':'контракт','emp')).filter(function(k){ return !String(e[k]||'').trim(); })
      .map(function(k){ return reqSet(isP?'подряд':'контракт','emp')[k]; }); })();
  var note = empMiss.length ? ('<div class="misline">● в карточке сотрудника не заполнено: <b>'+esc(empMiss.join(', '))+
    '</b> — <span class="back" onclick="empForm(CARD.emp)">открыть карточку</span></div>') : '';
  dlg(c.id?'Правка договора':'Новый договор', body,
    function(){
      var d={id:c.id||'',emp:c.emp||CARD.emp.id};
      ['kind','num','date','end','pos','posCode','salary','tariff','advance','rate','termText','wStart','wBreak','wEnd',
       'vacMain','vacExtra','workTime','status','termDate','notify','answer','link','note'].forEach(function(k){
        if($('f_'+k)) d[k]=val(k);   // скрытые поля не отправляем — они не должны затираться
      });
      busy(1); api({vapi:'hrsavecontract',data:JSON.stringify(d)}).then(function(r){ busy(0); apply(r,d.emp); });
    }, note);
}
/* печать по шаблону — только когда заполнено всё; иначе система прямо говорит, чего не хватает */
function genDoc(conId,what){
  busy(1);
  api({vapi:'hrgendoc',con:conId,what:what||''}).then(function(r){ busy(0);
    if(!r.ok){ alert(r.error); return; }
    apply(r,CARD&&CARD.emp.id); window.open(r.url,'_blank');
  });
}
/* загрузка готового договора: фото/скан/PDF, несколько файлов; имена приводятся к понятному виду */
function uploadDoc(conId){
  var inp=document.createElement('input'); inp.type='file'; inp.multiple=true;
  inp.accept='image/*,application/pdf';
  inp.onchange=function(){
    var files=[].slice.call(inp.files); if(!files.length) return;
    busy(1);
    var i=0, last=null;
    function next(){
      if(i>=files.length){ busy(0); load(1); if(last) alert('Загружено файлов: '+files.length); return; }
      var f=files[i], fr=new FileReader();
      fr.onload=function(){
        var b64=String(fr.result).split(',')[1];
        apiPost({vapi:'hrupload',con:conId,name:f.name,mime:f.type,b64:b64,idx:i+1,total:files.length})
          .then(function(r){ if(!r.ok){ busy(0); alert(r.error||'ошибка загрузки'); return; } last=r; i++; next(); })
          .catch(function(e){ busy(0); alert('сеть: '+e.message); });
      };
      fr.readAsDataURL(f);
    }
    next();
  };
  inp.click();
}

/* ─── реестр договоров ─── */
var CONFILTER='all';
function conFilter(v){ CONFILTER=v; render(); }
function numKey(x){ var m=String(x||'').match(/(\d+)/); return m?+m[1]:0; }
function dot(miss){ return (miss&&miss.length)?'<span title="не заполнено: '+esc(miss.join(', '))+'" style="color:var(--red);font-size:16px;line-height:1">●</span>':''; }
function conRegView(){
  var all=(DATA.contracts||[]).slice();
  var l=all.filter(function(c){ return CONFILTER==='all'||c.kind===CONFILTER; });
  // контракты идут подряд по номеру внутри года, подряды — по дате заключения
  l.sort(function(a,b){
    if(a.kind!==b.kind) return a.kind==='контракт'?-1:1;
    if(a.kind==='контракт'){ var ya=(a.date||'').slice(-4), yb=(b.date||'').slice(-4);
      if(ya!==yb) return ya<yb?-1:1; return numKey(a.num)-numKey(b.num); }
    return (dt(a.date)||0)-(dt(b.date)||0);
  });
  var byEmp={}; (DATA.list||[]).forEach(function(x){ byEmp[x.emp.id]=x.emp; });
  var h='<div class="row" style="margin-bottom:8px">'+
    ['all','контракт','подряд'].map(function(v){ return '<button class="btn'+(CONFILTER===v?' pri':'')+'" onclick="conFilter(\''+v+'\')">'+
      (v==='all'?'все':(v==='контракт'?'контракты':'подряд'))+'</button>'; }).join('')+
    '<span class="muted">всего: '+all.length+'</span></div>';
  h+='<div class="card tbwrap"><table><thead><tr><th></th><th>№</th><th>Дата</th><th>Вид</th><th>ФИО</th><th>Должность / работа</th><th>Окончание</th><th>Статус</th><th>Документ</th></tr></thead><tbody>';
  h+=l.map(function(c){
    var e=byEmp[c.emp]||{};
    return '<tr class="click" onclick="openCard(\''+c.emp+'\')"><td>'+dot(c.missing)+sevPill((c.state||{}).sev)+'</td>'+
      '<td><b>'+esc(c.num)+'</b></td><td>'+esc(c.date||'—')+'</td><td class="muted">'+esc(c.kind)+'</td>'+
      '<td>'+esc(e.fio||'—')+'</td><td>'+esc(c.pos||'—')+'</td><td>'+esc(c.end||'—')+'</td>'+
      '<td class="muted">'+esc(c.status)+'</td>'+
      '<td>'+(c.link?'<a href="'+esc(c.link)+'" target="_blank" onclick="event.stopPropagation()">открыть</a>':'<span class="muted">—</span>')+
      (c.source?' <span class="muted" style="font-size:11px">('+esc(c.source)+')</span>':'')+'</td></tr>';
  }).join('');
  return h+'</tbody></table>'+(l.length?'':'<div class="empty">Пусто.</div>')+'</div>';
}
function dt(ru){ var p=String(ru||'').split('.'); return p.length===3?new Date(+p[2],+p[1]-1,+p[0]).getTime():0; }

/* ─── реестры ─── */
function empOpts(v){ return '<div><label class="f">Сотрудник</label><select id="f_emp"><option value="">—</option>'+
  (DATA.list||[]).map(function(x){ return '<option value="'+x.emp.id+'"'+(x.emp.id===v?' selected':'')+'>'+esc(x.emp.fio)+'</option>'; }).join('')+'</select></div>'; }
function ordView(){
  var l=(DATA.orders||[]).slice().sort(function(a,b){
    if(a.series!==b.series) return a.series==='кадровые'?-1:1;
    var ya=(a.date||'').slice(-4), yb=(b.date||'').slice(-4);
    if(ya!==yb) return ya<yb?-1:1;
    return numKey(a.num)-numKey(b.num);
  });
  var h='<div class="row" style="margin-bottom:8px"><button class="btn pri" onclick="ordForm({})">+ Приказ</button><span class="muted">всего: '+l.length+'</span></div>';
  h+='<div class="card tbwrap"><table><thead><tr><th>№</th><th>Дата</th><th>Серия</th><th>Вид</th><th>ФИО</th><th>Основание</th></tr></thead><tbody>';
  h+=l.map(function(o){ return '<tr><td><b>'+esc(o.num)+'</b></td><td>'+esc(o.date||'—')+'</td><td class="muted">'+esc(o.series)+'</td><td>'+esc(o.kind||'')+'</td><td>'+esc(o.fio||'—')+'</td><td class="muted">'+esc(o.basis||'')+'</td></tr>'; }).join('');
  return h+'</tbody></table>'+(l.length?'':'<div class="empty">Пусто.</div>')+'</div>';
}
function ordForm(o){
  dlg('Приказ', sel('series','Серия',o.series||'кадровые',['кадровые','основная деятельность'])+
    fld('num','№ (пусто = следующий)',o.num)+fld('date','Дата',o.date)+fld('kind','Вид приказа',o.kind)+
    empOpts(o.emp)+fld('pos','Должность',o.pos)+fld('basis','Основание',o.basis)+fld('link','Ссылка',o.link),
    function(){
      var d={id:o.id||'',series:val('series'),num:val('num'),date:val('date'),kind:val('kind'),emp:val('emp'),
             pos:val('pos'),basis:val('basis'),link:val('link')};
      busy(1); api({vapi:'hrsaveorder',data:JSON.stringify(d)}).then(function(r){ busy(0); TAB='ord'; apply(r); });
    });
}
function sickView(){
  var l=DATA.sick||[];
  var h='<div class="row" style="margin-bottom:8px"><button class="btn pri" onclick="sickForm({})">+ Больничный</button><span class="muted">всего: '+l.length+'</span></div>';
  h+='<div class="card tbwrap"><table><thead><tr><th>Серия и номер</th><th>ФИО</th><th>С</th><th>По</th><th class="num">Расчёт</th></tr></thead><tbody>';
  h+=l.map(function(s){ return '<tr><td>'+esc(s.sernum)+'</td><td>'+esc(s.fio||'—')+'</td><td>'+esc(s.from||'—')+'</td><td>'+esc(s.to||'—')+'</td><td class="num">'+(s.calc?money(s.calc):'—')+'</td></tr>'; }).join('');
  return h+'</tbody></table>'+(l.length?'':'<div class="empty">Пусто.</div>')+'</div>';

function sickForm(s){

    fld('to','Дата окончания',s.to)+fld('calc','Расчёт',s.calc)+fld('note','Примечание',s.note),

}
function docView(){
  var l=DATA.docs||[];

function docForm(d){

function fuelView(){
  var l=DATA.fuel||[], t=DATA.fuelTotals||{};
