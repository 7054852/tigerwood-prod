<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Выработка — Тигервуд</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{ --bg:#fff; --fg:#222; --muted:#888; --line:#e3e3e3; --accent:#2b7de9; --green:#137333; --red:#c00; }
  *{box-sizing:border-box;}
  body{ font-family:-apple-system,Roboto,Arial,sans-serif; margin:0; padding:16px; color:var(--fg); }
  h2{ font-size:18px; margin:0 0 4px; }
  label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  select,input{ width:100%; padding:10px; border:1px solid var(--line); border-radius:9px; font-size:16px; }
  button{ width:100%; padding:12px; margin-top:14px; border:0; border-radius:9px; font-size:16px; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
  button.gray{ background:#eef; color:#334; } button.sm{ width:auto; padding:7px 12px; font-size:13px; margin:0; }
  .sum{ font-size:20px; font-weight:700; color:var(--green); margin-top:12px; text-align:center; }
  .msg{ font-size:14px; margin-top:10px; text-align:center; } .err{ color:var(--red); } .ok{ color:var(--green); }
  .card{ border:1px solid var(--line); border-radius:11px; padding:10px 12px; margin-bottom:8px; }
  .row{ display:flex; justify-content:space-between; gap:8px; align-items:center; flex-wrap:wrap; }
  .muted{ color:var(--muted); font-size:12px; }
  .tabs{ display:flex; gap:8px; margin-bottom:10px; }
  .tabs button{ width:auto; margin:0; padding:8px 14px; background:#eef; color:#334; }
  .tabs button.active{ background:var(--accent); color:#fff; }
</style>
</head>
<body>
<div class="tabs">
  <button id="tab-w" class="active" onclick="showTab('w')">✍️ Выработка</button>
  <button id="tab-m" onclick="showTab('m')">👏 Проверка</button>
  <button id="tab-j" onclick="showTab('j')">📋 Журнал</button>
</div>
<div id="pane-w">
  <div id="mysum"></div>
  <h2>Новый наряд</h2>
  <div class="muted" id="who"></div>
  <div id="wsel"></div>
  <label>Дата</label><input id="wdate" type="date">
  <label>Партия</label><select id="batch" onchange="onBatchChange()"></select>
  <label>Оборудование</label><select id="equip" onchange="fillDetails()"></select>
  <label>Деталь</label><select id="detail" onchange="fillOps()"></select>
  <label>Операция</label><select id="op" onchange="calc()"></select>
  <label>Количество</label><input id="qty" type="number" min="0" inputmode="numeric" oninput="calc()" placeholder="сколько сделано">
  <div class="sum" id="sum">—</div>
  <button class="gray" onclick="addToCart()">＋ Добавить в наряд</button>
  <div id="cart" style="margin-top:12px"></div>
  <button onclick="sendReport()" id="sendbtn" style="display:none">📨 Отправить наряд мастеру</button>
  <div class="msg" id="wmsg"></div>
</div>
<div id="pane-m" style="display:none">
  <h2>На проверке</h2>
  <div class="muted">Подтвердите, измените кол-во или отклоните — рабочий получит уведомление.</div>
  <div id="mlist" style="margin-top:10px">Загрузка…</div>
</div>
<div id="pane-j" style="display:none">
  <h2>Журнал выработки</h2>
  <div class="row" style="margin-top:8px">
    <input id="jfrom" type="date" style="width:auto;flex:1">
    <input id="jto" type="date" style="width:auto;flex:1">
    <button class="sm" onclick="loadJournal()">Показать</button>
  </div>
  <div id="jpay" style="margin-top:12px"></div>
  <div id="jlist" style="margin-top:10px"></div>
</div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbxbCSBcKbG-az-3-_JPJpMLtlQHenJJftHwXM_N-7PvBMfHWVD6xqxDD36nrmtBIz8W/exec';
var APP='tw7prod', DATA={equipments:[],batches:[],workers:[],comp:{},worker:''}, TGID='';
var COMP={}, EQUIPS=[];   // состав операций ВЫБРАННОЙ партии
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function opt(v,t){ return '<option value="'+esc(v)+'">'+esc(t||v)+'</option>'; }
function api(p){ p.app=APP; var q=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]);}).join('&'); return fetch(BASE+'?'+q).then(function(r){return r.json();}); }
function qp(n){ var m=new RegExp('[?&]'+n+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):''; }
try{ if(window.Telegram&&Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); var u=Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user; if(u) TGID=String(u.id); } }catch(e){}
if(!TGID){ TGID=qp('tgid')||localStorage.getItem('tw_tgid')||''; } if(TGID){ try{localStorage.setItem('tw_tgid',TGID);}catch(e){} }
function showTab(t){
  ['w','m','j'].forEach(function(x){
    document.getElementById('pane-'+x).style.display = x===t?'':'none';
    document.getElementById('tab-'+x).className = x===t?'active':'';
  });
  if(t==='m') loadPending();
  if(t==='j') loadJournal();
}
function load(){
  api({vapi:'data',tgid:TGID}).then(function(d){
    DATA=d||DATA;
    document.getElementById('batch').innerHTML=(DATA.batches||[]).map(function(b){return opt(b.id,b.num+' · '+b.name);}).join('')||opt('','нет активных партий');
    onBatchChange();
    loadMySummary();
    if(DATA.worker){ document.getElementById('who').textContent='Рабочий: '+DATA.worker; document.getElementById('wsel').innerHTML=''; }
    else if(TGID){ document.getElementById('wsel').innerHTML='<label>Вы впервые. Представьтесь — <b>Фамилия Имя</b>:</label><input id="reg-fio" placeholder="Иванов Иван"><button onclick="doRegister()">Зарегистрироваться</button><div class="msg" id="reg-msg"></div>'; }
    else { document.getElementById('wsel').innerHTML='<label>Кто вы</label><select id="worker">'+(DATA.workers||[]).map(function(w){return opt(w.name);}).join('')+'</select>'; }
  }).catch(function(e){ document.getElementById('wmsg').innerHTML='<span class="err">Ошибка загрузки</span>'; });
}
function onBatchChange(){
  var bid=document.getElementById('batch').value;
  if(!bid){ COMP={}; EQUIPS=[]; refillEquip(); return; }
  document.getElementById('equip').innerHTML=opt('','загрузка…');
  api({vapi:'ordercomp',batch:bid}).then(function(r){
    COMP=(r&&r.byEquip)||{}; EQUIPS=(r&&r.equipments)||[];
    refillEquip();
  }).catch(function(){ COMP={}; EQUIPS=[]; refillEquip(); });
}
function refillEquip(){
  document.getElementById('equip').innerHTML=EQUIPS.map(function(e){return opt(e);}).join('')||opt('','в этой партии нет операций');
  fillDetails();
}
function curProd(){ return (COMP||{})[document.getElementById('equip').value]||{details:{},order:[]}; }
function fillDetails(){ var p=curProd(); document.getElementById('detail').innerHTML=(p.order||[]).map(function(n){return opt(n);}).join('')||opt('','нет деталей'); fillOps(); }
function fillOps(){ var p=curProd(), name=document.getElementById('detail').value; var ops=(p.details||{})[name]||[]; document.getElementById('op').innerHTML=ops.map(function(o){return opt(o.op,o.op+' — '+o.rate);}).join(''); calc(); }
function curRate(){ var p=curProd(), name=document.getElementById('detail').value, op=document.getElementById('op').value; var o=((p.details||{})[name]||[]).filter(function(y){return y.op===op;})[0]; return o?o.rate:0; }
function calc(){ var q=Number(document.getElementById('qty').value)||0, r=curRate(); document.getElementById('sum').textContent = q>0 ? ('ЗП: '+(Math.round(q*r*100)/100)+' руб. ('+q+' × '+r+')') : '—'; }
var CART=[];
function wmsg(h){ var m=document.getElementById('wmsg'); if(m) m.innerHTML=h||''; }
function addToCart(){
  var worker=DATA.worker||(document.getElementById('worker')&&document.getElementById('worker').value)||'';
  if(!worker){ wmsg('<span class="err">Не выбран рабочий</span>'); return; }
  var equip=document.getElementById('equip').value, detail=document.getElementById('detail').value, op=document.getElementById('op').value, qty=Number(document.getElementById('qty').value)||0, rate=curRate();
  if(!op){ wmsg('<span class="err">Выберите операцию</span>'); return; }
  if(!(qty>0)){ wmsg('<span class="err">Укажите количество</span>'); return; }
  CART.push({equip:equip,detail:detail,op:op,qty:qty,rate:rate,sum:Math.round(qty*rate*100)/100});
  document.getElementById('qty').value=''; calc(); wmsg(''); renderCart();
}
function rmCart(i){ CART.splice(i,1); renderCart(); }
function renderCart(){
  var c=document.getElementById('cart'), sb=document.getElementById('sendbtn');
  if(!CART.length){ c.innerHTML=''; sb.style.display='none'; return; }
  var tot=CART.reduce(function(s,x){return s+x.sum;},0);
  c.innerHTML='<div class="card"><div class="row"><b>В наряде: '+CART.length+' оп.</b><b class="ok">'+(Math.round(tot*100)/100)+' руб.</b></div>'
    +CART.map(function(x,i){ return '<div class="row" style="border-top:1px solid #eee;padding-top:5px"><span>'+esc(x.detail)+' · '+esc(x.op)+' · '+x.qty+' шт → '+x.sum+' р.</span><button class="sm gray" onclick="rmCart('+i+')">✕</button></div>'; }).join('')
    +'</div>';
  sb.style.display='';
}
function sendReport(){
  var worker=DATA.worker||(document.getElementById('worker')&&document.getElementById('worker').value)||'';
  if(!worker){ wmsg('<span class="err">Не выбран рабочий</span>'); return; }
  if(!CART.length){ wmsg('<span class="err">Наряд пуст</span>'); return; }
  var batch=document.getElementById('batch').value, wd=document.getElementById('wdate').value, dateRu=wd?wd.split('-').reverse().join('.'):'';
  var items=CART.map(function(x){ return {equip:x.equip,detail:x.detail,op:x.op,qty:x.qty}; });
  wmsg('Отправляю наряд…');
  api({vapi:'submitreport',worker:worker,tgid:TGID,batch:batch,date:dateRu,items:JSON.stringify(items)}).then(function(r){
    if(r&&r.ok){ wmsg('<span class="ok">✅ Наряд отправлен: '+r.count+' оп. на '+r.sum+' руб. (на проверке)</span>'); CART=[]; renderCart(); loadMySummary(); }
    else wmsg('<span class="err">⚠️ '+esc((r&&r.error)||'ошибка')+'</span>');
  }).catch(function(){ wmsg('<span class="err">Ошибка отправки</span>'); });
}
function loadMySummary(){
  var worker=DATA.worker||'', box=document.getElementById('mysum'); if(!box) return;
  if(!worker){ box.innerHTML=''; return; }
  var n=new Date(), m=String(n.getMonth()+1).padStart(2,'0');
  var fromRu='01.'+m+'.'+n.getFullYear(), toRu=String(n.getDate()).padStart(2,'0')+'.'+m+'.'+n.getFullYear();
  api({vapi:'journal',from:fromRu,to:toRu,worker:worker}).then(function(r){
    var items=(r&&r.items)||[], pr=(r&&r.payroll)||[], zp=pr.length?pr[0].sum:0;
    var recent=items.slice(0,5).map(function(it){ return '<div class="row"><span class="muted">'+esc(it.date)+' · '+esc(it.op)+' · '+it.qty+'шт</span><span class="'+(it.status==='подтверждено'?'ok':(it.status==='отклонено'?'err':'muted'))+'">'+it.sum+'р · '+esc(it.status)+'</span></div>'; }).join('');
    box.innerHTML='<div class="card"><div class="row"><b>💰 Ваша ЗП за месяц (подтв.)</b><b class="ok">'+zp+' руб.</b></div>'
      +(recent?'<div class="muted" style="margin-top:6px">Последние отчёты:</div>'+recent:'<div class="muted" style="margin-top:6px">пока нет отчётов</div>')+'</div>';
  }).catch(function(){});
}
function loadPending(){
  var el=document.getElementById('mlist'); el.textContent='Загрузка…';
  api({vapi:'pending'}).then(function(r){
    var reps=(r&&r.reports)||[];
    if(!reps.length){ el.innerHTML='<div class="muted">Нет нарядов на проверке.</div>'; return; }
    el.innerHTML=reps.map(function(rp){
      var rid=rp.report;
      var lines=rp.lines.map(function(l){
        return '<div class="row" style="border-top:1px solid #eee;padding-top:5px"><span>'+esc(l.detail)+' · '+esc(l.op)+' · '+l.qty+' шт</span>'
          +'<span>'+l.sum+' р. <button class="sm gray" onclick="editOut(\''+esc(l.id)+'\','+l.qty+')">✏️</button>'
          +'<button class="sm gray" onclick="appr(\''+esc(l.id)+'\',0)" title="убрать эту строку из наряда">✖</button></span></div>';
      }).join('');
      return '<div class="card"><div class="row"><b>'+esc(rp.worker)+'</b><span class="muted">'+esc(rp.date)+' · '+esc(rp.batch)+'</span></div>'
        +'<div class="muted">'+(rp.single?'одиночная запись':'наряд')+': '+rp.lines.length+' оп. · <b>'+rp.sum+' руб.</b></div>'
        +lines
        +'<div class="row" style="margin-top:10px"><button class="sm" onclick="apprRep(\''+esc(rid)+'\',1)">✅ Одобрить'+(rp.single?'':' наряд')+'</button>'
        +'<button class="sm gray" onclick="apprRep(\''+esc(rid)+'\',0)">✖ Отклонить</button><span id="rm-'+esc(rid)+'" class="msg"></span></div></div>';
    }).join('');
  });
}
function apprRep(rid,ok){
  var m=document.getElementById('rm-'+rid); if(m) m.textContent='…';
  var single=rid.charAt(0)==='_';
  var p=single?{vapi:'approve',id:rid.slice(1),master:DATA.worker||'мастер',ok:ok?1:0}:{vapi:'approvereport',report:rid,master:DATA.worker||'мастер',ok:ok?1:0};
  api(p).then(function(r){ if(r&&r.ok){ loadPending(); } else if(m) m.innerHTML='<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; });
}
// правка строки внутри наряда (кол-во сохраняется, статус не меняется)
function editOut(id,cur){
  var q=prompt('Изменить количество (было '+cur+'):', cur);
  if(q===null) return; q=Number(q); if(!(q>0)){ alert('Кол-во должно быть > 0'); return; }
  api({vapi:'updoutput',id:id,qty:q}).then(function(r){ if(r&&r.ok){ loadPending(); } else alert((r&&r.error)||'ошибка'); });
}
// убрать/отклонить одну строку
function appr(id,ok){
  api({vapi:'approve',id:id,master:DATA.worker||'мастер',ok:ok?1:0}).then(function(r){ if(r&&r.ok){ loadPending(); } else alert('ошибка'); });
}
function editJournal(id,curQty,curDate){
  var q=prompt('Количество (было '+curQty+'):', curQty);
  if(q===null) return; q=Number(q); if(!(q>0)){ alert('Кол-во должно быть > 0'); return; }
  var d=prompt('Дата отчёта (дд.мм.гггг):', curDate||'');
  if(d===null) return;
  var m=document.getElementById('jm-'+id); if(m) m.textContent='…';
  api({vapi:'updoutput',id:id,qty:q,date:(d||'').trim()}).then(function(r){
    if(r&&r.ok){ loadJournal(); } else if(m){ m.innerHTML='<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; }
  });
}
function delJournal(id){
  if(!confirm('Удалить эту запись выработки? Пересчитается выполнение заказа.')) return;
  var m=document.getElementById('jm-'+id); if(m) m.textContent='…';
  api({vapi:'deloutput',id:id}).then(function(r){
    if(r&&r.ok){ var c=document.getElementById('j-'+id); if(c) c.style.opacity=.3; loadJournal(); }
    else if(m){ m.innerHTML='<span class="err">'+esc((r&&r.error)||'ошибка')+'</span>'; }
  });
}
function loadJournal(){
  var lst=document.getElementById('jlist'), pay=document.getElementById('jpay');
  lst.textContent='Загрузка…'; pay.innerHTML='';
  var from=document.getElementById('jfrom').value, to=document.getElementById('jto').value;
  var fromRu=from?from.split('-').reverse().join('.'):'', toRu=to?to.split('-').reverse().join('.'):'';
  api({vapi:'journal',from:fromRu,to:toRu}).then(function(r){
    var items=(r&&r.items)||[], pr=(r&&r.payroll)||[];
    if(pr.length){
      var tot=pr.reduce(function(s,p){return s+p.sum;},0);
      pay.innerHTML='<div class="card"><div class="row"><b>💰 ЗП за период (подтв.)</b><b class="ok">'+(Math.round(tot*100)/100)+' руб.</b></div>'
        +pr.map(function(p){return '<div class="row"><span>'+esc(p.worker)+'</span><span>'+p.sum+' руб.</span></div>';}).join('')+'</div>';
    }
    if(!items.length){ lst.innerHTML='<div class="muted">Нет записей за период.</div>'; return; }
    var stz={'подтверждено':'ok','отклонено':'err','на проверке':'muted'};
    // группировка по нарядам
    var groups=[], gidx={};
    items.forEach(function(it){
      var key=it.report||('_'+it.id);
      if(gidx[key]==null){ gidx[key]=groups.length; groups.push({single:!it.report,worker:it.worker,date:it.date,batch:it.batch,sum:0,lines:[]}); }
      var g=groups[gidx[key]]; g.sum+=it.sum; g.lines.push(it);
    });
    lst.innerHTML=groups.map(function(g){
      var lines=g.lines.map(function(it){
        return '<div class="row" id="j-'+esc(it.id)+'" style="border-top:1px solid #eee;padding-top:5px"><span>'+esc(it.detail)+' · '+esc(it.op)+' · '+it.qty+' шт</span>'
          +'<span class="'+(stz[it.status]||'muted')+'">'+it.sum+'р · '+esc(it.status)+' '
          +'<button class="sm gray" onclick="editJournal(\''+esc(it.id)+'\','+it.qty+',\''+esc(it.date)+'\')">✏️</button>'
          +'<button class="sm gray" onclick="delJournal(\''+esc(it.id)+'\')">🗑</button><span id="jm-'+esc(it.id)+'" class="msg"></span></span></div>';
      }).join('');
      return '<div class="card"><div class="row"><b>'+esc(g.worker)+'</b><span class="muted">'+esc(g.date)+' · '+esc(g.batch)+(g.single?'':' · наряд')+'</span></div>'
        +'<div class="muted">'+g.lines.length+' оп. · <b>'+(Math.round(g.sum*100)/100)+' руб.</b></div>'+lines+'</div>';
    }).join('');
  }).catch(function(){ lst.innerHTML='<span class="err">Ошибка загрузки</span>'; });
}
function doRegister(){
  var fio=(document.getElementById('reg-fio')||{}).value||'';
  var m=document.getElementById('reg-msg');
  if(fio.trim().length<3){ if(m){m.innerHTML='<span class="err">Введите Фамилию и Имя</span>';} return; }
  if(m){ m.textContent='Регистрирую…'; }
  api({vapi:'register',tgid:TGID,fio:fio}).then(function(r){ if(r&&r.ok){ load(); } else if(m){ m.innerHTML='<span class="err">'+((r&&r.error)||'ошибка')+'</span>'; } });
}
(function(){ var n=new Date(), m=String(n.getMonth()+1).padStart(2,'0'), today=n.getFullYear()+'-'+m+'-'+String(n.getDate()).padStart(2,'0');
  document.getElementById('jfrom').value=n.getFullYear()+'-'+m+'-01';
  document.getElementById('jto').value=today;
  document.getElementById('wdate').value=today; })();
load();
if(qp('tab')==='m'||qp('tab')==='check') showTab('m');
if(qp('tab')==='j') showTab('j');
</script>
</body>
</html>
