<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тигервуд — статистика</title>
<style>
  :root{ --bg:#f4f6fb; --card:#fff; --fg:#1b2333; --muted:#8a93a6; --line:#e6e9f2; --accent:#7c3aed; --green:#137333; --amber:#b7791f; --red:#c0392b; --blue:#2f6fb0; }
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);}
  body{ font-family:-apple-system,Roboto,Segoe UI,Arial,sans-serif; color:var(--fg); padding:14px; max-width:960px; margin:0 auto; font-size:14px; }
  .hi{ font-size:19px; font-weight:800; }
  .muted{ color:var(--muted); font-size:13px; }
  .sect{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:22px 4px 10px; }
  .box{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; overflow-x:auto; }
  .kpis{ display:flex; gap:12px; flex-wrap:wrap; }
  .kpi{ flex:1; min-width:130px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; }
  .kpi .n{ font-size:28px; font-weight:800; font-variant-numeric:tabular-nums; }
  .kpi .l{ font-size:12px; color:var(--muted); margin-top:2px; }
  .kpi.ok .n{ color:var(--green);} .kpi.no .n{ color:var(--red);} .kpi.ac .n{ color:var(--accent);}
  .barwrap{ height:10px; background:#eef1f8; border-radius:6px; overflow:hidden; display:flex; margin:12px 0 4px; }
  .barwrap i{ display:block; height:100%; } .barwrap .g{ background:var(--green);} .barwrap .r{ background:#f0c9c2;}
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td{ text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); }
  th{ color:var(--muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; }
  .pill{ font-size:11px; padding:2px 8px; border-radius:20px; font-weight:700; }
  .p-chief{ background:#e7f5ea; color:var(--green);} .p-master{ background:#fbf1de; color:var(--amber);} .p-none{ background:#eef1f8; color:#556;}
  .stbar{ display:flex; height:22px; border-radius:6px; overflow:hidden; font-size:11px; font-weight:700; color:#fff; margin-top:8px; }
  .stbar i{ display:flex; align-items:center; justify-content:center; min-width:2px; }
  details{ margin-top:10px; } summary{ cursor:pointer; color:var(--accent); font-weight:600; font-size:13px; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; } .chip{ font-size:12px; background:#f5f6f8; border:1px solid var(--line); border-radius:7px; padding:3px 8px; }
  .chip.clk{ cursor:pointer; } .chip.clk:hover{ border-color:var(--accent); background:#f0eafd; }
  .chip .cm{ color:var(--muted); margin-left:5px; }
  tr.clk{ cursor:pointer; } tr.clk:hover{ background:#faf8ff; }
  tr.clk td:first-child{ color:var(--accent); font-weight:600; }
  .center{ text-align:center; padding:40px; }
</style>
</head>
<body>
<style>html.emb>body>.hi{display:none}</style><script>if(/[?&]embed=1/.test(location.search))document.documentElement.classList.add('emb');</script>
<div class="hi">📊 Статистика</div>
<div class="muted" id="upd">загрузка…</div>
<div id="app"><div class="center muted">Загрузка…</div></div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbxbCSBcKbG-az-3-_JPJpMLtlQHenJJftHwXM_N-7PvBMfHWVD6xqxDD36nrmtBIz8W/exec';
function qp(n){ var m=new RegExp('[?&]'+n+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):''; }
var TGID=qp('tgid')||(function(){try{return localStorage.getItem('tw_tgid')||'';}catch(e){return '';}})();
function api(p){ p.app='tw7prod'; var q=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]==null?'':p[k]);}).join('&'); return fetch(BASE+'?'+q).then(function(r){return r.json();}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function $(id){ return document.getElementById(id); }
function money(n){ n=Number(n)||0; return n.toFixed(2).replace('.',','); }
function pct(a,b){ return b>0?Math.round(a/b*100):0; }

function spark(vals,color){ vals=vals.filter(function(v){return v!=null&&!isNaN(v);}); if(vals.length<2) return ''; var w=110,h=26,mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=(mx-mn)||1; var pts=vals.map(function(v,i){ return (i/(vals.length-1)*w).toFixed(1)+','+(h-((v-mn)/rng)*(h-3)-1.5).toFixed(1); }).join(' '); return '<svg width="'+w+'" height="'+h+'" style="vertical-align:middle;margin-left:4px"><polyline fill="none" stroke="'+color+'" stroke-width="2" points="'+pts+'"/></svg>'; }
function delta(cur,prev){ var d=cur-prev; if(d>0) return '<span style="color:var(--green);font-weight:800"> +'+d+'</span>'; if(d<0) return '<span style="color:var(--red)"> '+d+'</span>'; return '<span class="muted"> ±0</span>'; }
function jesc(s){ return String(s==null?'':s).replace(/[\\']/g,''); }   // безопасно для onclick-строки
// переход в другой раздел сервиса с фокусом (каталог по артикулу / расценки по оборудованию)
function navFocus(id,params){
  if(window.parent!==window && parent.goFocus){ if(parent.goFocus(id,params)!==false) return; }
  var u=BASE+'?page='+(id==='catalog'?'catalog':'ops');   // фолбэк вне сервиса
  if(params.find) u+='&find='+encodeURIComponent(params.find);
  if(params.focus) u+='&focus='+encodeURIComponent(params.focus);
  window.open(u,'_blank');
}
function doSnap(){ var b=$('snapBtn'); if(b){b.textContent='…';b.disabled=true;} api({vapi:'statsnap'}).then(function(){ render(); }); }
function render(){
 Promise.all([api({vapi:'stats'}), api({vapi:'statshist'})]).then(function(res){
  var r=res[0], hist=(res[1]&&res[1].rows)||[];
  if(!r||!r.ok){ $('app').innerHTML='<div class="center err">Ошибка</div>'; return; }
  var c=r.catalog, o=r.ops;
  var st=o.byStatus, tot=o.rates||1, curChecked=st.chief+st.master;
  var last=hist.length?hist[hist.length-1]:null;
  $('upd').textContent='обновлено сейчас · срезов: '+hist.length;

  // Динамика
  var dyn='';
  if(last){
    dyn='<div class="box" style="margin-bottom:12px"><div class="muted">Динамика с последнего среза · '+esc(last.date)+'</div><div class="chips" style="margin-top:8px">'
      +'<span class="chip">собрано изделий: <b>'+c.assembled+'</b>'+delta(c.assembled,last.assembled)+spark(hist.map(function(x){return x.assembled;}).concat([c.assembled]),'#137333')+'</span>'
      +'<span class="chip">проверено расценок: <b>'+curChecked+'</b>'+delta(curChecked,last.checked)+spark(hist.map(function(x){return x.checked;}).concat([curChecked]),'#7c3aed')+'</span>'
      +'<span class="chip">расценок: <b>'+o.rates+'</b>'+delta(o.rates,last.rates)+'</span>'
      +'<span class="chip">деталей: <b>'+o.details+'</b>'+delta(o.details,last.details)+'</span>'
      +'</div></div>';
  } else { dyn='<div class="muted" style="margin-bottom:12px">Срезов пока нет — нажми «Снять срез», чтобы зафиксировать точку отсчёта.</div>'; }

  var brand=c.byBrand.map(function(b){ return '<tr><td>'+esc(b.brand)+'</td><td class="num">'+b.total+'</td><td class="num" style="color:var(--green)">'+b.assembled+'</td><td class="num" style="color:var(--red)">'+b.notAssembled+'</td><td class="num">'+pct(b.assembled,b.total)+'%</td></tr>'; }).join('');
  var notChips=c.notList.slice(0,200).map(function(x){
    var art=(typeof x==='string')?x:x.art, model=(x&&x.model)||'';
    return '<span class="chip clk" title="открыть в каталоге и собрать" onclick="navFocus(\'catalog\',{find:\''+jesc(art)+'\'})">'+esc(art)+(model?'<span class="cm">'+esc(model)+'</span>':'')+'</span>'; }).join('');
  var equip=o.byEquip.map(function(e){
    var col=e.checkedPct>=66?'var(--green)':(e.checkedPct>=33?'var(--amber)':'#c0392b');
    var bar='<div style="width:90px;height:8px;background:#eef1f8;border-radius:5px;overflow:hidden;display:inline-block;vertical-align:middle"><i style="display:block;height:100%;width:'+e.checkedPct+'%;background:'+col+'"></i></div>';
    return '<tr class="clk" title="открыть расценки этого оборудования" onclick="navFocus(\'ops\',{focus:\''+jesc(e.equip)+'\'})"><td>'+esc(e.equip)+'</td><td class="num">'+e.details+'</td><td class="num">'+e.rates+'</td><td class="num">'+e.checked+' <span class="muted">('+e.checkedPct+'%)</span></td><td>'+bar+'</td></tr>'; }).join('');

  $('app').innerHTML=
    '<div style="text-align:right;margin-bottom:10px"><button id="snapBtn" style="background:var(--accent);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-weight:600;cursor:pointer" onclick="doSnap()">📸 Снять срез</button></div>'
    +dyn
    +'<div class="sect">Каталог изделий — собрано / не собрано</div>'
    +'<div class="kpis">'
      +'<div class="kpi ac"><div class="n">'+c.total+'</div><div class="l">всего изделий (артикулов)</div></div>'
      +'<div class="kpi ok"><div class="n">'+c.assembled+'</div><div class="l">собрано (есть состав)</div></div>'
      +'<div class="kpi no"><div class="n">'+c.notAssembled+'</div><div class="l">не собрано</div></div>'
    +'</div>'
    +'<div class="barwrap"><i class="g" style="width:'+pct(c.assembled,c.total)+'%"></i><i class="r" style="width:'+(100-pct(c.assembled,c.total))+'%"></i></div>'
    +'<div class="muted">'+pct(c.assembled,c.total)+'% каталога собрано</div>'
    +'<div class="box" style="margin-top:12px"><table><thead><tr><th>Бренд</th><th class="num">Всего</th><th class="num">Собрано</th><th class="num">Не собрано</th><th class="num">%</th></tr></thead><tbody>'+brand+'</tbody></table>'
      +'<details><summary>Показать не собранные ('+c.notList.length+')</summary><div class="chips">'+notChips+(c.notList.length>200?'<span class="chip">…</span>':'')+'</div></details></div>'

    +'<div class="sect">Операции и расценки — сколько работы заведено</div>'
    +'<div class="kpis">'
      +'<div class="kpi ac"><div class="n">'+o.rates+'</div><div class="l">всего расценок</div></div>'
      +'<div class="kpi"><div class="n">'+o.details+'</div><div class="l">деталей</div></div>'
      +'<div class="kpi"><div class="n">'+o.operations+'</div><div class="l">видов операций</div></div>'
    +'</div>'
    +'<div class="box" style="margin-top:12px"><div class="muted">Статус проверки расценок</div>'
      +'<div class="stbar">'
        +'<i class="p-chief" style="width:'+pct(st.chief,tot)+'%;background:var(--green)" title="начальник">'+(st.chief||'')+'</i>'
        +'<i class="p-master" style="width:'+pct(st.master,tot)+'%;background:var(--amber)" title="мастер">'+(st.master||'')+'</i>'
        +'<i class="p-none" style="width:'+pct(st.none,tot)+'%;background:#b9c0cc" title="не подтверждено">'+(st.none||'')+'</i>'
      +'</div>'
      +'<div class="chips"><span class="chip">🟢 начальник: '+st.chief+'</span><span class="chip">🟡 мастер: '+st.master+'</span><span class="chip">⚪ не подтверждено: '+st.none+'</span></div>'
    +'</div>'
    +'<div class="sect">По оборудованию — расценки и проверка</div>'
    +'<div class="muted" style="margin:-4px 4px 8px">Сколько деталей и расценок заведено по каждому оборудованию и сколько из них проверено.</div>'
    +'<div class="box"><table><thead><tr><th>Оборудование</th><th class="num">Деталей</th><th class="num">Расценок</th><th class="num">Проверено</th><th></th></tr></thead><tbody>'+equip+'</tbody></table></div>'
    +'<div id="rateaudit"></div>';
  loadRateAudit();
 }).catch(function(e){ $('app').innerHTML='<div class="center err">Ошибка: '+esc(e.message||e)+'</div>'; });
}
// ── аудит расхождений расценок (состав ↔ справочник) ──
var AUD=null;
function loadRateAudit(){
  var box=$('rateaudit'); if(!box) return;
  box.innerHTML='<div class="sect">Проверка расценок в составах</div><div class="muted" style="margin:0 4px">сверяю со справочником…</div>';
  api({vapi:'compaudit'}).then(function(d){ AUD=d; renderAudit(); }).catch(function(){ box.innerHTML=''; });
}
function renderAudit(){
  var box=$('rateaudit'); if(!box||!AUD) return;
  var vs=AUD.variants||[];
  if(!vs.length){ box.innerHTML='<div class="sect">Проверка расценок в составах</div><div class="box" style="border-color:#cfe9d7;background:#eaf7ef;color:var(--green)">✓ расценки во всех составах совпадают со справочником</div>'; return; }
  var totalDelta=vs.reduce(function(s,x){return s+x.delta;},0);
  var rows=vs.map(function(x,i){
    var dcol=x.delta<0?'var(--red)':'var(--green)';
    var diffs=x.diffs.map(function(df){ return '<tr><td>'+esc(df.detail)+'</td><td>'+esc(df.op)+'</td><td class="num">×'+df.qty+'</td><td class="num" style="color:var(--red)">'+money(df.was)+'</td><td class="num" style="color:var(--green)">'+money(df.now)+'</td></tr>'; }).join('');
    return '<div class="box" style="margin-bottom:10px;border-color:#f0d9b5">'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer" onclick="togAud('+i+')">'
        +'<span id="audc'+i+'" style="color:var(--muted)">▸</span>'
        +'<b style="flex:1;min-width:120px">'+esc(x.name)+'</b>'
        +'<span class="chip">'+x.count+' расц.</span>'
        +'<span class="chip" style="color:'+dcol+';font-weight:700">себест. '+(x.delta>0?'+':'')+money(x.delta)+' р</span>'
        +'<button style="background:var(--accent);color:#fff;border:0;border-radius:8px;padding:6px 11px;font-weight:600;cursor:pointer" onclick="event.stopPropagation();fixVar(\''+jesc(x.id)+'\',\''+jesc(x.name)+'\')">Подтянуть</button>'
      +'</div>'
      +'<div id="audb'+i+'" style="display:none;margin-top:10px;overflow-x:auto"><table><thead><tr><th>Деталь</th><th>Операция</th><th class="num">Кол-во</th><th class="num">Было</th><th class="num">Станет</th></tr></thead><tbody>'+diffs+'</tbody></table></div>'
    +'</div>';
  }).join('');
  box.innerHTML='<div class="sect">Проверка расценок в составах <span style="text-transform:none;font-weight:400;color:var(--red)">'+vs.length+' с расхождением · себест. '+money(totalDelta)+' р</span></div>'
    +'<div class="muted" style="margin:-4px 4px 10px">Расценка в составе не совпадает со справочником «Расценки» (кривой импорт). «Подтянуть» заменит на справочник; операции без справочника (упаковка) не трогаются.</div>'
    +'<div style="text-align:right;margin-bottom:10px"><button style="background:var(--red);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-weight:600;cursor:pointer" onclick="fixVar(\'ALL\',\'все варианты\')">Исправить все ('+vs.length+')</button></div>'
    +rows;
}
function togAud(i){ var b=$('audb'+i), c=$('audc'+i); if(b){ var open=b.style.display==='none'; b.style.display=open?'block':'none'; if(c)c.textContent=open?'▾':'▸'; } }
function fixVar(target,name){
  if(!TGID){ alert('нет входа (tgid) — откройте из сервиса'); return; }
  if(!confirm('Подтянуть расценки из справочника для «'+name+'»?\nЗаменит завышенные расценки на справочные. Операции без справочника не трогаются.')) return;
  api({vapi:'compratefix',tgid:TGID,target:target}).then(function(r){
    if(r&&r.ok){ alert('Готово: обновлено расценок — '+r.rowsChanged+', вариантов — '+r.variantsFixed); render(); }
    else alert((r&&r.error)||'ошибка');
  }).catch(function(){ alert('сеть недоступна'); });
}
render();
</script>
</body>
</html>
