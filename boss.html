<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тигервуд — начальник производства</title>
<style>
  :root{ --bg:#f4f6fb; --card:#fff; --fg:#1b2333; --muted:#8a93a6; --line:#e6e9f2; --accent:#2b7de9; --green:#137333; --amber:#b7791f; --red:#c0392b; }
  *{box-sizing:border-box;} html,body{margin:0;background:var(--bg);}
  body{ font-family:-apple-system,Roboto,Segoe UI,Arial,sans-serif; color:var(--fg); padding:14px; max-width:900px; margin:0 auto; font-size:14px; }
  .hi{ font-size:19px; font-weight:800; }
  .muted{ color:var(--muted); font-size:13px; }
  .sect{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:18px 4px 8px; }
  .box{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; }
  /* месяц — крупные плитки */
  .month{ background:linear-gradient(180deg,#eef5ff,#fff); border:1px solid #d7e6fb; border-radius:16px; padding:16px; margin-top:6px; }
  .mrow{ display:flex; gap:10px; flex-wrap:wrap; align-items:stretch; }
  .tile{ flex:1 1 130px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:11px 13px; }
  .tile .t{ font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
  .tile .v{ font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px; }
  .tile .v small{ font-size:13px; font-weight:600; color:var(--muted); }
  .big{ color:var(--green); }
  /* карточка заказа */
  .ocard{ background:var(--card); border:1px solid var(--line); border-radius:14px; margin-bottom:10px; box-shadow:0 1px 3px rgba(20,30,60,.05); }
  .ohead{ display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; flex-wrap:wrap; }
  .ohead:hover{ background:#fafbfe; }
  .onum{ font-weight:800; } .oname{ font-weight:600; flex:1; min-width:100px; }
  .money{ font-weight:800; font-variant-numeric:tabular-nums; }
  .car{ color:var(--muted); font-size:12px; width:12px; transition:transform .15s ease; }
  .ocard.open .car{ transform:rotate(90deg); }
  .obody{ display:none; padding:0 14px 12px; } .ocard.open .obody{ display:block; }
  .bar{ height:7px; border-radius:6px; background:#eef1f8; overflow:hidden; min-width:70px; flex:1; max-width:160px; }
  .bar>i{ display:block; height:100%; background:var(--green); }
  .kpis{ display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 2px; }
  .kpi{ font-size:12px; background:#f2f5fb; border:1px solid var(--line); border-radius:20px; padding:2px 10px; color:#445; }
  .kpi b{ color:var(--fg); }
  .pill{ font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; }
  .p-ok{ background:#e7f5ea; color:var(--green); } .p-warn{ background:#fdecea; color:var(--red); } .p-neu{ background:#eef1f8; color:#556; }
  table{ width:100%; border-collapse:collapse; font-size:13px; margin-top:6px; }
  th,td{ text-align:left; padding:6px 6px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th{ color:var(--muted); font-size:11px; text-transform:uppercase; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; }
  .center{ text-align:center; padding:34px 16px; color:var(--muted); }
  .rin{ width:58px; padding:5px 6px; border:1px solid var(--line); border-radius:7px; font-size:13px; text-align:right; font-variant-numeric:tabular-nums; }
  .rreset{ border:1px solid var(--line); background:#f2f5fb; color:#556; border-radius:7px; padding:4px 7px; font-size:13px; cursor:pointer; margin-left:2px; }
  .rreset:hover{ background:#e7edf7; }
</style>
</head>
<body>
<style>html.emb>body>.hi,html.emb>body>.muted.sub0{display:none}</style><script>if(/[?&]embed=1/.test(location.search))document.documentElement.classList.add('emb');</script>
<div class="hi">🏭 Начальник производства</div>
<div class="muted sub0">Оклад + мотивация за упакованные изделия. Ставки задаёт директор.</div>
<div id="app"><div class="center">Загрузка…</div></div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbxbCSBcKbG-az-3-_JPJpMLtlQHenJJftHwXM_N-7PvBMfHWVD6xqxDD36nrmtBIz8W/exec';
var APP='tw7prod';
function api(p){ p.app=APP; var q=Object.keys(p).map(function(k){return k+'='+encodeURIComponent(p[k]==null?'':p[k]);}).join('&'); return fetch(BASE+'?'+q).then(function(r){return r.json();}); }
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function money(n){ return (Number(n)||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function qp(n){ var m=new RegExp('[?&]'+n+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):''; }
var TGID=qp('tgid')||(function(){try{return localStorage.getItem('tw_tgid')||'';}catch(e){return '';}})();
if(TGID){ try{localStorage.setItem('tw_tgid',TGID);}catch(e){} }
var ORDERS=[], MO={}, DIR=false, OPEN={};   // DIR=директор/админ (может менять ставки); OPEN — какие заказы раскрыты

function load(){
  Promise.all([ api({vapi:'bossmonth'}), api({vapi:'bossorders'}), TGID?api({vapi:'me',tgid:TGID}):Promise.resolve(null) ]).then(function(r){
    MO=r[0]||{}; ORDERS=(r[1]||{}).orders||[];
    var me=r[2]; DIR=!!(me&&me.ok&&(me.role==='директор'||me.role==='админ'));
    render();
  }).catch(function(e){ $('app').innerHTML='<div class="center">Сеть недоступна</div>'; });
}
function render(){
  var app=$('app'), mo=MO;
  var month='<div class="sect">Этот месяц ('+esc(mo.month||'')+')'+(DIR?' — начальник производства':'')+'</div>'
    +'<div class="month"><div class="mrow">'
    +'<div class="tile"><div class="t">Оклад</div><div class="v">'+money(mo.salary)+' <small>р</small></div></div>'
    +'<div class="tile"><div class="t">Мотивация за упаковку</div><div class="v big">'+money(mo.motivation)+' <small>р</small></div></div>'
    +'<div class="tile"><div class="t">Итого за месяц</div><div class="v">'+money(mo.total)+' <small>р</small></div></div>'
    +'<div class="tile"><div class="t">Упаковано изделий</div><div class="v">'+(mo.packed||0)+'</div></div>'
    +'</div>'
    +(mo.packedNoVariant? '<div class="muted" style="margin-top:8px">⚠ '+mo.packedNoVariant+' шт упаковки без указанного варианта — мастер не проставил изделие, мотивация по ним не начислена.</div>':'')
    +'</div>';
  var pot=ORDERS.reduce(function(s,o){return s+(o.potential||0);},0);
  var earn=ORDERS.reduce(function(s,o){return s+(o.earned||0);},0);
  var hint=DIR? 'ставки ₽/шт можно менять — базовая берётся из справочника (10% труда)' : 'потенциал '+money(pot)+' · заработано '+money(earn)+' р';
  var orders='<div class="sect">'+(DIR?'Заказы — ставки и деньги начальника':'Заказы в работе — деньги для меня')+' <span class="muted" style="text-transform:none;font-weight:400">'+hint+'</span></div>'
    +(DIR? '<div style="margin:0 0 10px"><button onclick="recalcRates()" style="background:#eef1f8;color:#334;border:1px solid #d7dbe6;border-radius:9px;padding:8px 13px;font-weight:600;cursor:pointer" title="пересчитать базовые ставки от текущего труда изделий (10%)">↻ Пересчитать ставки от труда</button> <span class="msg" id="rrMsg"></span></div>' : '')
    +(ORDERS.length? ORDERS.map(orderCard).join('') : '<div class="box muted">активных заказов нет</div>');
  app.innerHTML=month+orders;
  Object.keys(OPEN).forEach(function(id){ if(OPEN[id]){ var c=$('oc_'+id); if(c) c.classList.add('open'); } });
}
function riskPill(k){
  if(!k.deadline) return '<span class="pill p-neu">срок не задан</span>';
  if(k.risk==='late') return '<span class="pill p-warn">🔴 не успеваем</span>';
  if(k.risk==='tight') return '<span class="pill p-neu" style="background:#f7efdb;color:#b7791f">🟡 впритык</span>';
  if(k.risk==='done') return '<span class="pill p-ok">✔ готов</span>';
  return '<span class="pill p-ok">🟢 в срок ('+esc(k.deadline)+')</span>';
}
function rateCell(o,p){
  if(DIR){
    var reset = p.overridden ? ' <button class="rreset" title="вернуть к расчётной ('+p.base+' ₽/шт)" onclick="resetRate(\''+esc(o.id)+'\',\''+esc(p.sku)+'\',this)">↩</button>' : '';
    return '<td class="num" style="white-space:nowrap"><input class="rin" value="'+p.rate+'" inputmode="decimal" title="ставка ₽/шт (расчётная '+p.base+')" onchange="saveRate(\''+esc(o.id)+'\',\''+esc(p.sku)+'\',this.value,this)">'+reset+'</td>';
  }
  return '<td class="num">'+p.rate+'</td>';   // начальник: только число, без индикатора правки
}
function orderCard(o,i){
  var k=o.kpi||{}, pct=Math.min(100,k.pct||0);
  var rows=(o.products||[]).map(function(p){
    return '<tr><td>'+esc(p.model||p.eq)+'</td>'
      +rateCell(o,p)
      +'<td class="num">'+p.packed+'/'+p.ordered+'</td>'
      +'<td class="num">'+money(p.earned)+'</td>'
      +'<td class="num">'+money(p.potential)+'</td></tr>';
  }).join('');
  return '<div class="ocard" id="oc_'+esc(o.id)+'">'
    +'<div class="ohead" onclick="tog(\''+esc(o.id)+'\')">'
      +'<span class="car">▸</span>'
      +'<span class="onum">'+esc(o.num)+'</span><span class="oname">'+esc(o.name)+'</span>'
      +'<span class="bar"><i style="width:'+pct+'%'+(pct>=100?';background:#137333':'')+'"></i></span>'
      +'<span class="money">'+money(o.earned)+' / '+money(o.potential)+' р</span>'
    +'</div>'
    +'<div class="obody">'
      +'<div class="kpis">'
        +'<span class="kpi">Готовность <b>'+(k.pct||0)+'%</b></span>'
        +'<span class="kpi">Упаковано <b>'+k.packedUnits+'/'+k.totalUnits+'</b></span>'
        +'<span class="kpi">'+(DIR?'Начислено':'Заработано')+' <b>'+money(o.earned)+' р</b> из '+money(o.potential)+'</span>'
        +riskPill(k)
        +(k.checksTotal? '<span class="pill p-warn">нестыковок: '+k.checksTotal+'</span>':'<span class="pill p-ok">данные чисты</span>')
      +'</div>'
      +'<div class="kpis"><span class="muted">Бонусы:</span>'
        +'<span class="pill '+(k.bonusSrok==='ок'?'p-ok':(k.bonusSrok==='риск'?'p-warn':'p-neu'))+'">срок: '+esc(k.bonusSrok)+'</span>'
        +'<span class="pill '+(k.bonusEcon==='ок'?'p-ok':'p-warn')+'">экономия: '+esc(k.bonusEcon)+'</span>'
      +'</div>'
      +'<table><thead><tr><th>Изделие</th><th class="num">Ставка ₽/шт</th><th class="num">Упаковано</th><th class="num">'+(DIR?'Начислено':'Заработано')+'</th><th class="num">Потенциал</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'</div></div>';
}
function tog(id){ var c=$('oc_'+id); if(c){ var open=c.classList.toggle('open'); OPEN[id]=open; } }
function recalcRates(){
  var m=$('rrMsg'); if(m) m.textContent='пересчитываю…';
  api({vapi:'recalcbossrates'}).then(function(r){
    if(r&&r.ok){ if(m) m.innerHTML='<span style="color:#137333">обновлено ставок: '+(r.changedCount||0)+'</span>'; load(); }
    else if(m) m.innerHTML='<span style="color:#c0392b">'+((r&&r.error)||'ошибка')+'</span>';
  }).catch(function(){ if(m) m.innerHTML='<span style="color:#c0392b">сеть</span>'; });
}
function saveRate(orderId,sku,val,el){
  var v=String(val).trim().replace(',','.'); if(el) el.disabled=true;
  OPEN[orderId]=true;
  api({vapi:'setbossorderrate',batch:orderId,sku:sku,rate:v}).then(function(r){
    if(r&&r.ok){ load(); } else { if(el) el.disabled=false; alert((r&&r.error)||'не сохранилось'); }
  }).catch(function(){ if(el) el.disabled=false; alert('сеть недоступна'); });
}
// вернуть расценку к расчётной (пустая ставка → бэкенд ставит базовую 10% труда)
function resetRate(orderId,sku,el){
  if(el) el.disabled=true; OPEN[orderId]=true;
  api({vapi:'setbossorderrate',batch:orderId,sku:sku,rate:''}).then(function(r){
    if(r&&r.ok){ load(); } else { if(el) el.disabled=false; alert((r&&r.error)||'не сбросилось'); }
  }).catch(function(){ if(el) el.disabled=false; alert('сеть недоступна'); });
}
load();
</script>
</body>
</html>
